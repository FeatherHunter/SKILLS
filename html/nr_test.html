<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡路里 · 营养配比</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --fg:#1d1d1f; --fg2:#6e6e73; --fg3:#86868b; --bg:#fafafa;
    --card:#fff; --border:#d2d2d7; --accent:#0071e3;
    --good:#34c759; --warn:#ff9500; --bad:#ff3b30; --soft:#f5f5f7;
    --prot:#5856d6; --carb:#34c759; --fat:#ff9500;
    --r1:#ff3b30; --r2:#ff9500; --r3:#34c759;
  }
  body { font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
         line-height:1.6; color:var(--fg); background:var(--bg);
         max-width:920px; margin:0 auto; padding:48px 24px 80px;
         -webkit-font-smoothing:antialiased; }
  h1 { font-size:28px; font-weight:700; letter-spacing:-.02em; margin-bottom:4px; }
  .sub { font-size:14px; color:var(--fg3); margin-bottom:24px; }
  .pill { display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; font-weight:600; margin-right:4px; }
  .pill-good { background:rgba(52,199,89,.15); color:var(--good); }
  .pill-warn { background:rgba(255,149,0,.15); color:var(--warn); }
  .pill-bad  { background:rgba(255,59,48,.15); color:var(--bad); }
  .pill-info { background:rgba(0,113,227,.15); color:var(--accent); }
  .kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
  .kpi { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px 18px; }
  .kpi .label { font-size:12px; color:var(--fg2); margin-bottom:4px; }
  .kpi .value { font-size:24px; font-weight:700; }
  .kpi .extra { font-size:11px; color:var(--fg3); margin-top:3px; }
  .section { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px 26px; margin-bottom:16px; }
  .section h2 { font-size:17px; font-weight:600; margin-bottom:14px; }
  /* 饼图 + 图例 */
  .pie-wrap { display:flex; align-items:center; gap:32px; }
  svg.pie { width:200px; height:200px; flex-shrink:0; }
  .pie-legend { flex:1; font-size:13px; }
  .pie-legend .row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
  .pie-legend .row:last-child { border-bottom:none; }
  .pie-legend .dot { width:14px; height:14px; border-radius:3px; flex-shrink:0; }
  .pie-legend .name { font-weight:600; flex:1; }
  .pie-legend .bar-wrap { flex:1.5; height:8px; background:var(--soft); border-radius:4px; overflow:hidden; position:relative; }
  .pie-legend .bar { height:100%; border-radius:4px; transition:width 0.3s; }
  .pie-legend .range-mark { position:absolute; top:-2px; bottom:-2px; width:2px; background:rgba(0,0,0,.15); }
  .pie-legend .val { width:90px; text-align:right; font-variant-numeric:tabular-nums; font-weight:600; }
  .pie-legend .pct { font-size:11px; color:var(--fg3); font-weight:400; }
  /* 总结表格 */
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { padding:9px 12px; text-align:left; border-bottom:1px solid var(--border); }
  th { background:var(--soft); font-weight:500; font-size:11px; color:var(--fg2); }
  tr:last-child td { border-bottom:none; }
  .num { font-variant-numeric:tabular-nums; text-align:right; font-weight:600; }
  th.num, td.num { text-align:right; }
  .footer { margin-top:24px; padding:14px 18px; background:var(--soft); border-radius:12px; display:flex; justify-content:space-between; align-items:center; }
  .footer .src { font-size:12px; color:var(--fg3); }
  .btn { border:1px solid var(--border); background:var(--card); padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12px; color:var(--fg); }
  .btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
  .meta-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .meta-bar .left { font-size:12px; color:var(--fg2); }
  .meta-bar .type-badge { font-size:11px; padding:3px 10px; border-radius:6px; background:var(--soft); color:var(--fg2); font-weight:600; }
</style>
</head>
<body>

<script>window.__DATA__ = {"status": "ok", "data": {"summary": {"total_calorie": 12760, "protein_g": 580, "carb_g": 1450, "fat_g": 380, "protein_pct": 18, "carb_pct": 45, "fat_pct": 27, "balance": "good"}, "target": {"protein_g": 840, "carb_g": 1400, "fat_g": 420}, "range": {"protein": {"min": 10, "max": 20, "label": "10-20%"}, "carb": {"min": 45, "max": 65, "label": "45-65%"}, "fat": {"min": 20, "max": 35, "label": "20-35%"}}, "meta": {"start": "2026-07-18", "end": "2026-07-24", "days": 7, "today": "2026-07-24"}}, "message": "已生成 2026-07-18 ~ 2026-07-24 营养配比(7 天)"};</script>

<div class="meta-bar">
  <div class="left" id="metaLeft">--</div>
  <div class="type-badge">报告型 · 3 维配比</div>
</div>

<h1>🥗 营养配比</h1>
<p class="sub" id="sub">--</p>

<div class="kpi-grid">
  <div class="kpi"><div class="label">蛋白</div><div class="value" id="kProt">--</div><div class="extra" id="kProtE">--</div></div>
  <div class="kpi"><div class="label">碳水</div><div class="value" id="kCarb">--</div><div class="extra" id="kCarbE">--</div></div>
  <div class="kpi"><div class="label">脂肪</div><div class="value" id="kFat">--</div><div class="extra" id="kFatE">--</div></div>
</div>

<div class="section">
  <h2>热量来源占比</h2>
  <div class="pie-wrap">
    <svg class="pie" id="pie" viewBox="0 0 200 200"></svg>
    <div class="pie-legend" id="legend"></div>
  </div>
</div>

<div class="section">
  <h2>推荐范围对比</h2>
  <table>
    <thead><tr><th>营养素</th><th class="num">实际</th><th class="num">推荐下限</th><th class="num">推荐上限</th><th class="num">缺口</th><th>状态</th></tr></thead>
    <tbody id="table"></tbody>
  </table>
</div>

<div class="footer">
  <div class="src" id="srcLine">📊 数据来源:--</div>
  <button class="btn" id="copyBtn">📋 复制数据</button>
</div>

<script>
(function(){
  const D = window.__DATA__;
  if (!D || D.status !== 'ok') {
    document.body.innerHTML = '<div style="padding:60px;text-align:center;color:#86868b">⚠ 数据未注入或状态非 ok</div>';
    return;
  }
  const { summary, target, range, meta } = D.data;

  document.getElementById('metaLeft').textContent =
    `${meta.start} ~ ${meta.end} · 共 ${meta.days} 天 · 总摄入 ${summary.total_calorie.toLocaleString()} 卡`;
  const status = summary.balance === 'good' ? '<span class="pill pill-good">✓ 均衡</span>'
              : summary.balance === 'warn' ? '<span class="pill pill-warn">⚠ 失衡</span>'
              : '<span class="pill pill-bad">✗ 严重失衡</span>';
  document.getElementById('sub').innerHTML = `查营养配比 · ${meta.start} → ${meta.end} · 3 维宏量营养素 ${status}`;

  // 3 KPI
  function setKpi(id, v, t, color, cls) {
    document.getElementById(id).textContent = v + 'g';
    document.getElementById(id + 'E').innerHTML = `${t}% · 目标 ${target[id.replace('k','').toLowerCase()+'_g']}g`;
    document.getElementById(id + 'E').className = 'extra ' + cls;
  }
  setKpi('kProt', summary.protein_g, summary.protein_pct, 'prot', summary.protein_pct >= 10 ? 'good' : summary.protein_pct < 5 ? 'bad' : 'warn');
  setKpi('kCarb', summary.carb_g, summary.carb_pct, 'carb', summary.carb_pct >= 45 && summary.carb_pct <= 65 ? 'good' : summary.carb_pct < 35 ? 'bad' : 'warn');
  setKpi('kFat', summary.fat_g, summary.fat_pct, 'fat', summary.fat_pct >= 20 && summary.fat_pct <= 35 ? 'good' : summary.fat_pct > 40 ? 'bad' : 'warn');

  // 饼图 (基于热量贡献)
  const svg = document.getElementById('pie');
  const cx = 100, cy = 100, r = 80;
  const items = [
    {key:'protein', name:'蛋白', g: summary.protein_g, cal: summary.protein_g * 4, color:'var(--prot)', pct: summary.protein_pct},
    {key:'carb',    name:'碳水', g: summary.carb_g,    cal: summary.carb_g * 4,    color:'var(--carb)', pct: summary.carb_pct},
    {key:'fat',     name:'脂肪', g: summary.fat_g,     cal: summary.fat_g * 9,     color:'var(--fat)',  pct: summary.fat_pct},
  ];
  const totalCal = items.reduce((a,b)=>a+b.cal, 0) || 1;
  let start = -Math.PI / 2;
  items.forEach(it => {
    const ang = (it.cal / totalCal) * Math.PI * 2;
    const end = start + ang;
    const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
    const x2 = cx + r * Math.cos(end),   y2 = cy + r * Math.sin(end);
    const large = ang > Math.PI ? 1 : 0;
    svg.insertAdjacentHTML('beforeend',
      `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${it.color}"/>`);
    start = end;
  });
  svg.insertAdjacentHTML('beforeend',
    `<circle cx="${cx}" cy="${cy}" r="50" fill="#fff"/>` +
    `<text x="${cx}" y="${cy - 4}" text-anchor="middle" font-size="11" fill="#86868b">总热量</text>` +
    `<text x="${cx}" y="${cy + 14}" text-anchor="middle" font-size="16" font-weight="700" fill="#1d1d1f">${summary.total_calorie.toLocaleString()}</text>`);

  // 饼图 legend + 推荐范围标记
  const legend = document.getElementById('legend');
  items.forEach(it => {
    const r = range[it.key];
    // 推荐范围:10-90% 映射到 bar 宽度(假设 bar 宽度 200px)
    const barW = 200;
    const startPct = (r.min / 100) * barW;
    const endPct = (r.max / 100) * barW;
    legend.insertAdjacentHTML('beforeend',
      `<div class="row">` +
      `<div class="dot" style="background:${it.color}"></div>` +
      `<div class="name">${it.name} <span style="font-size:11px;color:var(--fg3);font-weight:400">${r.label}</span></div>` +
      `<div class="bar-wrap" style="width:${barW}px">` +
      `<div class="bar" style="width:${Math.min(it.pct, 100)}%;background:${it.color}"></div>` +
      `<div class="range-mark" style="left:${startPct}px"></div>` +
      `<div class="range-mark" style="left:${endPct}px"></div>` +
      `</div>` +
      `<div class="val">${it.pct}%<div class="pct">${it.g}g</div></div>` +
      `</div>`);
  });

  // 表格
  const tb = document.getElementById('table');
  items.forEach(it => {
    const r = range[it.key];
    const target_g = target[it.key + '_g'];
    const diff = target_g - it.g;
    const diffStr = diff > 0 ? `+${diff}` : `${diff}`;
    const inRange = it.pct >= r.min && it.pct <= r.max;
    const status = inRange
      ? '<span class="pill pill-good">✓ 在范围内</span>'
      : it.pct < r.min
        ? '<span class="pill pill-warn">↓ 偏低</span>'
        : '<span class="pill pill-bad">↑ 偏高</span>';
    tb.insertAdjacentHTML('beforeend',
      `<tr><td><strong>${it.name}</strong></td>` +
      `<td class="num">${it.g}g <span style="color:var(--fg3);font-weight:400">(${it.pct}%)</span></td>` +
      `<td class="num">${r.min}% (${Math.round(r.min / 100 * target_g)}g)</td>` +
      `<td class="num">${r.max}% (${Math.round(r.max / 100 * target_g)}g)</td>` +
      `<td class="num">${diffStr}g</td>` +
      `<td>${status}</td></tr>`);
  });

  document.getElementById('srcLine').textContent =
    `📊 数据来源:diet_analysis · ${meta.start} → ${meta.end} · ${meta.days} 天`;
  document.getElementById('copyBtn').onclick = function() {
    const r = `营养配比 ${meta.start} → ${meta.end} (${meta.days} 天)\n` +
              `总热量 ${summary.total_calorie.toLocaleString()} 卡\n` +
              `蛋白 ${summary.protein_g}g (${summary.protein_pct}%) · 推荐 ${range.protein.label}\n` +
              `碳水 ${summary.carb_g}g (${summary.carb_pct}%) · 推荐 ${range.carb.label}\n` +
              `脂肪 ${summary.fat_g}g (${summary.fat_pct}%) · 推荐 ${range.fat.label}`;
    navigator.clipboard.writeText(r).then(() => {
      this.textContent = '✓ 已复制';
      setTimeout(() => this.textContent = '📋 复制数据', 2000);
    });
  };
})();
</script>

</body>
</html>
