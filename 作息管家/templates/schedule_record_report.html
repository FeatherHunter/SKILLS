<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<style>
/* ===== 视觉严格沿用历史 _render_report_*.py(参考 2026-06-25.html 等)===== */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;background:#f5f5f7;color:#1d1d1f;line-height:1.6;-webkit-font-smoothing:antialiased}

.container{max-width:720px;margin:0 auto;padding:24px 16px}

/* header */
.header{text-align:center;padding:32px 0 24px}
.header h1{font-size:28px;font-weight:700;letter-spacing:-.5px}
.header .date{font-size:15px;color:#86868b;margin-top:4px}
.header .weekday{display:inline-block;font-size:12px;font-weight:500;color:#fff;background:#007AFF;border-radius:12px;padding:2px 10px;margin-top:8px}

/* card */
.card{background:#fff;border-radius:14px;padding:24px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.card h2{font-size:17px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card h2 .icon{font-size:20px}

/* summary grid */
.summary-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.summary-item{display:flex;align-items:center;padding:12px 14px;background:#f5f5f7;border-radius:10px;gap:10px}
.summary-item .emoji{font-size:22px;width:32px;text-align:center;flex-shrink:0}
.summary-item .info{flex:1;min-width:0}
.summary-item .cat{font-size:13px;font-weight:500;color:#1d1d1f}
.summary-item .dur{font-size:12px;color:#86868b;margin-top:1px}
.summary-item .bar{height:4px;background:#e5e5e5;border-radius:2px;margin-top:6px;overflow:hidden}
.summary-item .bar-fill{height:100%;border-radius:2px;transition:width .6s ease}

/* total */
.total-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#f5f5f7;border-radius:10px;margin-top:12px}
.total-row .label{font-size:14px;font-weight:500;color:#1d1d1f}
.total-row .value{font-size:20px;font-weight:700;color:#007AFF}
.total-row .check{font-size:14px;color:#34c759;margin-left:6px}

/* timeline */
.timeline{display:flex;gap:2px;height:40px;border-radius:8px;overflow:hidden;margin-bottom:8px}
.timeline-block{flex:1;position:relative;cursor:pointer;transition:opacity .15s}
.timeline-block:hover{opacity:.8}
.timeline-block .tip{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1d1d1d;color:#fff;font-size:11px;padding:4px 8px;border-radius:6px;white-space:nowrap;z-index:10;pointer-events:none}
.timeline-block:hover .tip{display:block}
.timeline-labels{display:flex;justify-content:space-between;font-size:10px;color:#86868b;padding:0 2px}

/* timeline legend */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#86868b}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* highlights */
.highlights{display:flex;flex-direction:column;gap:10px}
.highlight-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#f5f5f7;border-radius:10px}
.highlight-row .h-emoji{font-size:18px;flex-shrink:0;margin-top:1px}
.highlight-row .h-text{font-size:13px;color:#1d1d1f;line-height:1.5}
.highlight-row .h-time{font-size:12px;color:#86868b;margin-top:2px}
.highlight-empty{padding:14px 18px;text-align:center;background:#f5f5f7;border-radius:10px;color:#86868b;font-size:13px}

/* sleep */
.sleep-grid{display:flex;flex-direction:column;gap:10px}
.sleep-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:#f5f5f7;border-radius:10px}
.sleep-row .h-emoji{font-size:18px;flex-shrink:0;margin-top:1px}
.sleep-row .h-text{font-size:13px;color:#1d1d1f;line-height:1.5}
.sleep-row .h-time{font-size:12px;color:#86868b;margin-top:2px}

/* 离线态 */
.offline-banner{background:#fff3e0;border:1px solid #ffb74d;border-radius:8px;padding:10px 14px;margin-bottom:16px;text-align:center;color:#a25b00;font-size:13px}

/* footer */
.footer{text-align:center;padding:20px 0;font-size:11px;color:#86868b}

/* 响应式 */
@media(max-width:480px){
  .summary-grid{grid-template-columns:1fr}
  .container{padding:16px 12px}
}
</style>
</head>
<body>
<div class="container">

<!-- ====== 离线态(手册 §7 必备):本地浏览器打开,无外网,自动展示 ====== -->
<div class="offline-banner">📡 本页面是作息管家的离线 HTML 报告 — 单文件自包含,无外部依赖,可直接保存或转发</div>

<!-- ====== header(历史 _render_report_*.py 风格) ====== -->
<div class="header">
  <h1 id="title-h1">每日作息报告</h1>
  <div class="date" id="date-text">{{ date }}</div>
  <span class="weekday" id="weekday-chip"></span>
</div>

<div id="root"></div>

<div class="footer" id="footer-text">
  作息管家 · 自动生成于 <span id="gen-time"></span> · 共 <span id="record-count"></span> 个记录块
</div>

</div>

<!-- ====== 数据注入:模式 B(手册 §5) — <script id="payload"> 标签 ====== -->
<script id="payload" type="application/json"></script>

<script>
/* ====== 手册 §6 数据契约 + §11 安全 + §12 审查 10 条 ======
 * 字段名稳定;用户输入全部走 escapeHTML;数组空时显示"空态";5 大状态齐全
 */
(function(){
  "use strict";

  var raw = document.getElementById("payload");
  var payload, parseError = null;
  try {
    payload = JSON.parse(raw.textContent || "{}");
  } catch (e) {
    parseError = e && e.message ? e.message : String(e);
  }

  if (parseError) {
    document.getElementById("root").innerHTML =
      '<div class="card" style="border:1px solid #ffd1d1;background:#fff5f5"><h2>❌ 数据解析失败</h2>' +
      '<div class="highlight-row" style="background:#fff0f0;color:#a83228">' +
      '<span class="h-emoji">⚠️</span><div class="h-text">' + escapeHTML(parseError) + '</div></div></div>';
    return;
  }

  var status = (payload && payload.status) || "ok";
  var data = (payload && payload.data) || {};

  if (status !== "ok") {
    document.getElementById("root").innerHTML =
      '<div class="card" style="border:1px solid #ffd1d1"><h2>❌ 加载失败</h2>' +
      '<div class="highlight-row" style="background:#fff0f0;color:#a83228">' +
      '<span class="h-emoji">⛔</span><div class="h-text">' +
      escapeHTML((payload && payload.message) || JSON.stringify(payload)) +
      '</div></div></div>';
    return;
  }

  var meta = data.meta || {};
  var summaryItems = data.summary_items || [];
  var timeline = data.timeline || [];
  var sleepData = data.sleep_data || {};
  var highlights = data.highlights || [];
  var errors = data.errors || [];

  /* ====== 手册 §12 第 5 条:数组空时仍正常 ====== */
  if (summaryItems.length === 0) {
    document.getElementById("root").innerHTML =
      '<div class="card"><h2>📅 ' + escapeHTML(meta.date || "这一天") +
      ' · 无作息记录</h2><div class="highlight-empty">该日 schedule_records 表没有记录 —— 试试同步语录数据库或手动 add 一条</div></div>';
    return;
  }

  /* ====== header 元信息 ====== */
  document.title = (payload && payload.data && payload.data.meta) ? (
    (function(){
      var m = payload.data.meta;
      try {
        var dt = new Date(m.date);
        var w = ["日","一","二","三","四","五","六"][dt.getDay()];
        return "作息报告 · " + dt.getFullYear() + "年" + (dt.getMonth()+1) + "月" + dt.getDate() + "日（周" + w + "）";
      } catch(e) { return "作息报告 · " + (m.date || ""); }
    })()
  ) : "作息报告";

  document.getElementById("date-text").textContent = (function(){
    try {
      var dt = new Date(meta.date);
      return dt.getFullYear() + "年" + (dt.getMonth()+1) + "月" + dt.getDate() + "日";
    } catch(e) { return meta.date || ""; }
  })();
  document.getElementById("weekday-chip").textContent = (function(){
    try {
      var dt = new Date(meta.date);
      return "周" + ["日","一","二","三","四","五","六"][dt.getDay()];
    } catch(e) { return ""; }
  })();
  document.getElementById("gen-time").textContent = meta.generated_at || "";
  document.getElementById("record-count").textContent = String(meta.record_count || 0);

  /* ====== 4 段卡片渲染 ====== */
  var html = "";

  /* 第 ① 段:时间分配 */
  html += '<div class="card">';
  html += '<h2><span class="icon">📊</span> 时间分配</h2>';
  html += '<div class="summary-grid">';
  summaryItems.forEach(function(s){
    html += '<div class="summary-item">';
    html += '<span class="emoji">' + escapeHTML(s.emoji) + '</span>';
    html += '<div class="info">';
    html += '<div class="cat">' + escapeHTML(s.category) + '</div>';
    html += '<div class="dur">' + escapeHTML(s.duration_text) + '</div>';
    html += '<div class="bar"><div class="bar-fill" style="width:' + s.pct + '%;background:' +
            escapeHTML(s.color) + '"></div></div>';
    html += '</div></div>';
  });
  html += '</div>';
  html += '<div class="total-row">';
  html += '<span class="label">总计</span>';
  var totalH = Math.floor(meta.total_minutes / 60);
  var totalM = meta.total_minutes % 60;
  var totalText = totalH ? (totalM ? (totalH + '小时' + totalM + '分钟') : (totalH + '小时')) : (totalM + '分钟');
  html += '<span><span class="value">' + escapeHTML(totalText) + '</span>';
  html += '<span class="check">✓</span></span>';
  html += '</div></div>';

  /* 第 ② 段:24h 时间轴 */
  html += '<div class="card">';
  html += '<h2><span class="icon">⏰</span> 24小时时间轴</h2>';
  html += '<div class="timeline">';
  timeline.forEach(function(t){
    html += '<div class="timeline-block" style="background:' + escapeHTML(t.color) + '">' +
            '<div class="tip">' + escapeHTML(t.tip) + '</div></div>';
  });
  html += '</div>';
  html += '<div class="timeline-labels">';
  html += '<span>00:00</span><span>06:00</span><span>12:00</span><span>18:00</span><span>23:59</span>';
  html += '</div>';
  /* legend:去重 + 按 category 出现顺序 */
  var seenCats = [];
  var seenSet = {};
  timeline.forEach(function(t){
    if (!seenSet[t.category]) {
      seenSet[t.category] = true;
      seenCats.push(t.category);
    }
  });
  if (seenCats.length > 0) {
    html += '<div class="legend">';
    seenCats.forEach(function(c){
      var color = timeline.find(function(x){ return x.category===c; }).color;
      html += '<div class="legend-item"><div class="legend-dot" style="background:' + escapeHTML(color) + '"></div>' +
              escapeHTML(c) + '</div>';
    });
    html += '</div>';
  }
  html += '</div>';

  /* 第 ③ 段:当日亮点(默认空 → 占位,手册 §12 第 5 条:数组空仍正常) */
  html += '<div class="card">';
  html += '<h2><span class="icon">⭐</span> 当日亮点</h2>';
  if (highlights.length === 0) {
    html += '<div class="highlight-empty">📝 本日 AI 叙事要点待生成 —— 后续 Phase 2 可支持 /tmp/highlight_&lt;date&gt;.json 注入路径</div>';
  } else {
    html += '<div class="highlights">';
    highlights.forEach(function(h){
      html += '<div class="highlight-row">';
      html += '<span class="h-emoji">' + escapeHTML(h.emoji || "📌") + '</span>';
      html += '<div>';
      if (h.title) html += '<div class="h-text"><b>' + escapeHTML(h.title) + '</b>:' + escapeHTML(h.detail || '') + '</div>';
      else html += '<div class="h-text">' + escapeHTML(h.detail || '') + '</div>';
      if (h.time_range) html += '<div class="h-time">' + escapeHTML(h.time_range) + '</div>';
      html += '</div></div>';
    });
    html += '</div>';
  }
  html += '</div>';

  /* 第 ④ 段:睡眠分析(沿用历史 _render_report_*.py 的格式) */
  html += '<div class="card">';
  html += '<h2><span class="icon">🌙</span> 睡眠分析</h2>';
  if (!sleepData.main_sleep) {
    html += '<div class="highlight-empty">该日无主睡眠记录</div>';
  } else {
    html += '<div class="sleep-grid">';
    var ms = sleepData.main_sleep;
    var sufficientTag = sleepData.is_sufficient ? '✅ 充足' : '⚠️ 偏短(建议 7h+)';
    html += '<div class="sleep-row">';
    html += '<span class="h-emoji">🛌</span>';
    html += '<div>';
    html += '<div class="h-text">主睡眠：' + escapeHTML(ms.duration_text) +
            '（' + escapeHTML(ms.time_start) + ' ~ ' + escapeHTML(ms.time_end) + '）</div>';
    html += '<div class="h-time">' + escapeHTML(sufficientTag) +
            (sleepData.total_records > 1 ? ' · 共 ' + sleepData.total_records + ' 段睡眠(含午睡)' : '') + '</div>';
    html += '</div></div>';
    html += '</div>';
  }
  html += '</div>';

  /* errors(若有) */
  if (errors.length > 0) {
    html += '<div class="card" style="border:1px solid #ffd1d1"><h2>⚠️ 渲染警告</h2>';
    errors.forEach(function(e){
      html += '<div class="highlight-row" style="background:#fff0f0;color:#a83228">' +
              '<span class="h-emoji">⚠️</span><div class="h-text">' + escapeHTML(String(e)) + '</div></div>';
    });
    html += '</div>';
  }

  document.getElementById("root").innerHTML = html;

  /* ====== 手册 §11:中文乱码防御 —— 全部 escapeHTML,不依赖浏览器自动转码 ====== */
  function escapeHTML(s){
    return String(s ?? "").replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
    });
  }
})();
</script>
</body>
</html>
