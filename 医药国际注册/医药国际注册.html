<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医药国际注册</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#007AFF;
  --blue-light:rgba(0,122,255,0.08);
  --text:#1d1d1f;
  --text-secondary:#86868b;
  --bg:#ffffff;
  --bg-alt:#f5f5f7;
  --border:#e5e5ea;
  --radius:10px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue","PingFang SC",sans-serif;
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);color:var(--text);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased}

/* Header */
.header{padding:48px 24px 32px;max-width:960px;margin:0 auto}
.header h1{font-size:28px;font-weight:700;letter-spacing:-0.5px;margin-bottom:6px}
.header p{font-size:15px;color:var(--text-secondary);line-height:1.5}

/* Search */
.search-wrap{padding:0 24px 8px;max-width:960px;margin:0 auto;position:sticky;top:0;z-index:10;background:var(--bg)}
.search-box{position:relative}
.search-box input{width:100%;padding:12px 16px 12px 40px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;font-family:var(--font);background:var(--bg-alt);outline:none;transition:border-color .2s}
.search-box input:focus{border-color:var(--blue)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-secondary)}
.search-count{font-size:13px;color:var(--text-secondary);padding:6px 0 0;display:none}
.search-count.visible{display:block}

/* Tabs */
.tabs{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 24px 0;max-width:960px;margin:0 auto;border-bottom:1px solid var(--border);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-secondary);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* Content */
.content{max-width:960px;margin:0 auto;padding:0 24px 80px}
.group{display:none}
.group.active{display:block}
.group-title{font-size:20px;font-weight:600;padding:28px 0 16px;letter-spacing:-0.3px}

/* Card */
.card{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:#c7c7cc}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.card-head:hover{background:var(--bg-alt)}
.card-left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.card-name{font-size:15px;font-weight:600;white-space:nowrap}
.card-desc{font-size:13px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.card-arrow{font-size:12px;color:var(--text-secondary);transition:transform .25s;flex-shrink:0}
.card.open .card-arrow{transform:rotate(90deg)}

/* Detail */
.card-detail{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.card.open .card-detail{display:block}

/* Tags */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tag{display:inline-block;padding:4px 10px;font-size:12px;font-weight:500;color:var(--blue);background:var(--blue-light);border-radius:6px;cursor:pointer;transition:background .15s}
.tag:hover{background:rgba(0,122,255,0.14)}

/* Capability */
.cap{margin-bottom:14px}
.cap-label{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.cap-name{font-size:14px;font-weight:500;padding:8px 12px;background:var(--bg-alt);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .15s}
.cap-name:hover{background:#e8e8ed}
.cap-name .cap-icon{font-size:11px;color:var(--text-secondary)}

/* Flow */
.flow{display:none;margin-top:8px;padding:12px;background:var(--bg-alt);border-radius:8px;font-size:13px;line-height:1.7}
.flow.open{display:block}
.flow-title{font-weight:600;font-size:13px;margin-bottom:8px;color:var(--text)}
.flow-step{padding:4px 0;display:flex;gap:8px}
.flow-step::before{content:"";display:block;width:4px;height:4px;border-radius:50%;background:var(--blue);margin-top:8px;flex-shrink:0}
.flow-ops{margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.flow-op{padding:3px 0;font-size:12px;color:var(--text-secondary)}
.flow-op code{font-family:"SF Mono",Menlo,monospace;font-size:11px;background:rgba(0,0,0,0.05);padding:2px 5px;border-radius:4px}

/* Highlight */
.highlight{background:rgba(0,122,255,0.12);border-radius:2px}

/* Empty */
.empty{text-align:center;padding:60px 24px;color:var(--text-secondary);font-size:15px}

/* Responsive */
@media(max-width:640px){
  .header{padding:36px 20px 24px}
  .header h1{font-size:24px}
  .tabs{padding:12px 20px 0}
  .content{padding:0 20px 80px}
  .search-wrap{padding:0 20px 8px}
  .card-desc{display:none}
  .tag{font-size:11px;padding:3px 8px}
}
</style>
</head>

// ==================== RENDER ====================
function renderAll() {
  const container = document.getElementById('content');
  container.innerHTML = GROUPS.map(g => `
    <div class="group" data-group="${g.id}">
      <div class="group-title">${g.title}</div>
      <p style="font-size:13px;color:var(--text-secondary);margin:-8px 0 16px">${g.desc}</p>
      ${g.items.map((item, i) => renderCard(item, g.id, i)).join('')}
    </div>
  `).join('');
}

function renderCard(item, gid, idx) {
  const id = `card-${gid}-${idx}`;
  const capTags = item.caps.map(c => {
    const cap = CAPS[c];
    return `<span class="tag" data-cap="${c}">${cap.name.replace(/^[^\s]+\s/, '')}</span>`;
  }).join('');

  const capDetails = item.caps.map(c => {
    const cap = CAPS[c];
    const flowId = `flow-${gid}-${idx}-${c}`;
    return `
      <div class="cap">
        <div class="cap-name" onclick="toggleFlow('${flowId}',this)">
          <span>${cap.name}</span>
          <span class="cap-icon">▸ 流程</span>
        </div>
        <div class="flow" id="${flowId}">
          <div class="flow-title">执行流程</div>
          ${cap.flow.map(s => `<div class="flow-step">${s}</div>`).join('')}
          <div class="flow-ops">
            <div class="flow-title" style="margin-top:8px">副作用 / 写入</div>
            ${cap.writes.map(w => `<div class="flow-op">${w}</div>`).join('')}
          </div>
        </div>
      </div>`;
  }).join('');

  return `
    <div class="card" id="${id}" data-name="${item.name}" data-desc="${item.desc}">
      <div class="card-head" onclick="toggleCard('${id}')">
        <div class="card-left">
          <span class="card-name">${item.name}</span>
          <span class="card-desc">${item.desc}</span>
        </div>
        <span class="card-arrow">▸</span>
      </div>
      <div class="card-detail">
        <div class="tags">${capTags || '<span style="font-size:12px;color:var(--text-secondary)">自动路由</span>'}</div>
        ${capDetails || '<p style="font-size:13px;color:var(--text-secondary)">根据用户意图自动选择最合适的方法论</p>'}
      </div>
    </div>`;
}

// ==================== INTERACTION ====================
function toggleCard(id) {
  document.getElementById(id).classList.toggle('open');
}

function toggleFlow(flowId, el) {
  const flow = document.getElementById(flowId);
  const isOpen = flow.classList.toggle('open');
  el.querySelector('.cap-icon').textContent = isOpen ? '▾ 收起' : '▸ 流程';
}

// Tabs
document.getElementById('tabs').addEventListener('click', e => {
  if (!e.target.classList.contains('tab')) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  e.target.classList.add('active');
  const group = e.target.dataset.group;
  document.querySelectorAll('.group').forEach(g => {
    g.classList.toggle('active', group === 'all' || g.dataset.group === group);
  });
  filterBySearch();
});

// Search
const searchInput = document.getElementById('search');
const searchCount = document.getElementById('searchCount');

searchInput.addEventListener('input', filterBySearch);

function filterBySearch() {
  const q = searchInput.value.trim().toLowerCase();
  const activeTab = document.querySelector('.tab.active').dataset.group;
  let visible = 0;

  document.querySelectorAll('.card').forEach(card => {
    const name = card.dataset.name.toLowerCase();
    const desc = card.dataset.desc.toLowerCase();
    const match = !q || name.includes(q) || desc.includes(q);
    const groupVisible = activeTab === 'all' || card.closest('.group').dataset.group === activeTab;
    card.style.display = (match && groupVisible) ? '' : 'none';
    if (match && groupVisible) visible++;

    // Highlight
    const nameEl = card.querySelector('.card-name');
    const descEl = card.querySelector('.card-desc');
    if (q) {
      nameEl.innerHTML = highlightText(card.dataset.name, q);
      descEl.innerHTML = highlightText(card.dataset.desc, q);
    } else {
      nameEl.textContent = card.dataset.name;
      descEl.textContent = card.dataset.desc;
    }
  });

  searchCount.textContent = q ? `找到 ${visible} 个` : '';
  searchCount.classList.toggle('visible', !!q);
}

function highlightText(text, q) {
  const i = text.toLowerCase().indexOf(q);
  if (i === -1) return text;
  return text.slice(0, i) + '<span class="highlight">' + text.slice(i, i + q.length) + '</span>' + text.slice(i + q.length);
}

// Init
renderAll();
document.querySelectorAll('.group').forEach(g => g.classList.add('active'));
</script>
