<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡路里 · 状态查看</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --fg:#1d1d1d; --fg2:#6e6e73; --fg3:#86868b; --bg:#fafafa;
    --card:#fff; --border:#d2d2d7; --accent:#0071e3;
    --good:#34c759; --warn:#ff9500; --bad:#ff3b30; --soft:#f5f5f7;
  }
  body { font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
         line-height:1.6; color:var(--fg); background:var(--bg);
         max-width:920px; margin:0 auto; padding:48px 24px 80px;
         -webkit-font-smoothing:antialiased; }
  h1 { font-size:28px; font-weight:700; letter-spacing:-.02em; margin-bottom:4px; }
  .sub { font-size:14px; color:var(--fg3); margin-bottom:24px; }
  .pill { display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; font-weight:600; margin-right:4px; }
  .pill-good { background:rgba(52,199,89,.15); color:var(--good); }
  .pill-warn { background:rgba(255,149,0,.15); color:var(--warn); }
  .pill-info { background:rgba(0,113,227,.15); color:var(--accent); }
  .meta-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .meta-bar .left { font-size:12px; color:var(--fg2); }
  .meta-bar .type-badge { font-size:11px; padding:3px 10px; border-radius:6px; background:var(--accent); color:#fff; font-weight:700; }
  .kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
  .kpi { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px 18px; }
  .kpi .label { font-size:12px; color:var(--fg2); margin-bottom:6px; }
  .kpi .value { font-size:22px; font-weight:700; }
  .kpi .extra { font-size:11px; color:var(--fg3); margin-top:3px; }
  .section { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px 26px; margin-bottom:16px; }
  .section h2 { font-size:17px; font-weight:600; margin-bottom:14px; }
  .key-val { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:14px; }
  .key-val:last-child { border-bottom:none; }
  .key-val .key { color:var(--fg2); }
  .key-val .val { font-weight:600; font-variant-numeric:tabular-nums; }
  pre.json { background:#1d1d1f; color:#f5f5f7; padding:18px 22px; border-radius:12px; overflow-x:auto; font-size:12.5px; line-height:1.6; margin-top:12px; }
  pre.json .k { color:#ff9500; }
  pre.json .v { color:#34c759; }
  pre.json .s { color:#5ac8fa; }
  .footer { margin-top:24px; padding:14px 18px; background:var(--soft); border-radius:12px; display:flex; justify-content:space-between; align-items:center; }
  .footer .src { font-size:12px; color:var(--fg3); }
  .btn { border:1px solid var(--border); background:var(--card); padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12px; color:var(--fg); }
  .btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
  .copy-row { display:flex; gap:8px; align-items:center; }
  .copy-row .btn { flex-shrink:0; }
</style>
</head>
<body>

<!--INJECT-DATA-->

<div class="meta-bar">
  <div class="left" id="metaLeft">--</div>
  <div class="type-badge">报告型 · 状态查看</div>
</div>

<h1 id="h1Title">👤 状态查看</h1>
<p class="sub" id="sub">--</p>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="section">
  <h2 id="detailTitle">详细信息</h2>
  <div id="detailList"></div>
</div>

<div class="section" id="jsonSection" style="display:none">
  <h2>原始数据</h2>
  <pre class="json" id="jsonPre"></pre>
</div>

<div class="footer">
  <div class="src" id="srcLine">📊 数据来源:--</div>
  <div class="copy-row">
    <button class="btn" id="copyJsonBtn">📋 复制 JSON</button>
  </div>
</div>

<script>
(function(){
  const D = window.__DATA__;
  if (!D || D.status !== 'ok') {
    document.body.innerHTML = '<div style="padding:60px;text-align:center;color:#86868b">⚠ 数据未注入或状态非 ok</div>';
    return;
  }
  const { entity, kpis, fields, raw, meta } = D.data;

  document.getElementById('metaLeft').textContent = `${entity.type} · ${meta.fetched_at}`;
  document.getElementById('h1Title').textContent = entity.title;
  document.getElementById('sub').innerHTML = entity.subtitle;
  document.getElementById('detailTitle').textContent = entity.section_title || '详细信息';

  // 4 KPI
  const kpiGrid = document.getElementById('kpiGrid');
  kpis.forEach(k => {
    kpiGrid.insertAdjacentHTML('beforeend',
      `<div class="kpi"><div class="label">${k.label}</div>` +
      `<div class="value">${k.value}</div>` +
      (k.extra ? `<div class="extra">${k.extra}</div>` : '') +
      `</div>`);
  });

  // 字段
  const dl = document.getElementById('detailList');
  fields.forEach(f => {
    dl.insertAdjacentHTML('beforeend',
      `<div class="key-val"><span class="key">${f.key}</span><span class="val">${f.value}</span></div>`);
  });

  // 原始 JSON(可选)
  if (raw && Object.keys(raw).length > 0) {
    document.getElementById('jsonSection').style.display = 'block';
    const formatted = JSON.stringify(raw, null, 2)
      .replace(/"([^"]+)":/g, '"<span class="k">$1</span>":')
      .replace(/: "([^"]+)"/g, ': "<span class="v">$1</span>"')
      .replace(/: (\d+)/g, ': <span class="v">$1</span>')
      .replace(/: (true|false)/g, ': <span class="v">$1</span>');
    document.getElementById('jsonPre').innerHTML = formatted;
  }

  document.getElementById('srcLine').textContent = `📊 数据来源:${meta.source} · ${meta.fetched_at}`;

  document.getElementById('copyJsonBtn').onclick = function() {
    navigator.clipboard.writeText(JSON.stringify(raw, null, 2)).then(() => {
      this.textContent = '✓ 已复制';
      setTimeout(() => this.textContent = '📋 复制 JSON', 2000);
    });
  };
})();
</script>

</body>
</html>
