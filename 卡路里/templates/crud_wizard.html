<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡路里 · 配置向导</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --fg:#1d1d1d; --fg2:#6e6e73; --fg3:#86868b; --bg:#fafafa;
    --card:#fff; --border:#d2d2d7; --accent:#0071e3;
    --good:#34c759; --warn:#ff9500; --bad:#ff3b30; --soft:#f5f5f7;
  }
  body { font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
         line-height:1.6; color:var(--fg); background:var(--bg);
         max-width:780px; margin:0 auto; padding:48px 24px 80px;
         -webkit-font-smoothing:antialiased; }
  h1 { font-size:30px; font-weight:700; letter-spacing:-.025em; margin-bottom:4px; }
  .sub { font-size:14px; color:var(--fg3); margin-bottom:24px; }
  .pill { display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; font-weight:600; margin-right:4px; }
  .pill-good { background:rgba(52,199,89,.15); color:var(--good); }
  .pill-info { background:rgba(0,113,227,.15); color:var(--accent); }
  .meta-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .meta-bar .left { font-size:12px; color:var(--fg2); }
  .meta-bar .type-badge { font-size:11px; padding:3px 10px; border-radius:6px; background:var(--accent); color:#fff; font-weight:700; }
  .section { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:24px 28px; margin-bottom:16px; }
  .section h2 { font-size:17px; font-weight:600; margin-bottom:14px; }
  .form-group { margin-bottom:14px; }
  .form-group label { display:block; font-size:12px; color:var(--fg2); margin-bottom:6px; font-weight:500; }
  .form-group input, .form-group select, .form-group textarea {
    width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:8px;
    font-size:14px; font-family:inherit; background:#fff;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,113,227,.15);
  }
  .form-group .hint { font-size:11px; color:var(--fg3); margin-top:4px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  /* 生成的 prompt 区 */
  .prompt-box { background:#1d1d1f; color:#f5f5f7; padding:18px 22px; border-radius:12px;
               font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:12.5px;
               line-height:1.65; white-space:pre-wrap; word-break:break-word;
               min-height:80px; margin-bottom:14px; }
  .footer { margin-top:24px; padding:16px 18px; background:var(--soft); border-radius:12px;
           display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
  .footer .src { font-size:12px; color:var(--fg3); }
  .btn { border:1px solid var(--border); background:var(--card); padding:8px 16px; border-radius:8px;
         cursor:pointer; font-size:13px; color:var(--fg); }
  .btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .btn-primary:hover { background:#005bb0; }
  .actions { display:flex; gap:8px; }
  .switch-mode { display:flex; gap:6px; background:var(--soft); padding:4px; border-radius:8px; margin-bottom:16px; }
  .switch-mode button { border:none; background:transparent; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:13px; color:var(--fg2); }
  .switch-mode button.active { background:var(--card); color:var(--fg); font-weight:600; box-shadow:0 1px 3px rgba(0,0,0,.08); }
</style>
</head>
<body>

<!--INJECT-DATA-->

<div class="meta-bar">
  <div class="left" id="metaLeft">--</div>
  <div class="type-badge">配置型 · 通用向导</div>
</div>

<h1 id="h1Title">⚙️ 配置向导</h1>
<p class="sub" id="sub">--</p>

<div class="switch-mode" id="modeSwitch">
  <button data-mode="profile" class="active">👤 设置档案</button>
  <button data-mode="cron">⏰ 开启定时复盘</button>
</div>

<div class="section">
  <h2 id="formTitle">设置参数</h2>
  <form id="configForm"></form>
</div>

<div class="section">
  <h2>📋 复制 prompt 给 AI</h2>
  <p style="font-size:12.5px;color:var(--fg2);margin-bottom:10px;">填好参数后,点击「生成 prompt」,把以下内容贴给 AI 执行:</p>
  <div class="prompt-box" id="promptBox">// 先填写参数 → 点击"生成 prompt"</div>
  <div class="actions" style="margin-top:10px">
    <button class="btn" id="genBtn">🔄 生成 prompt</button>
    <button class="btn btn-primary" id="copyBtn">📋 复制 prompt</button>
  </div>
</div>

<div class="footer">
  <div class="src" id="srcLine">⚙️ 配置向导 · v2.1.2</div>
</div>

<script>
(function(){
  const D = window.__DATA__;
  if (!D || D.status !== 'ok') return;
  const { schemas, current_mode, defaults } = D.data;

  document.getElementById('metaLeft').textContent = `${current_mode} 向导`;
  document.getElementById('h1Title').textContent = schemas[current_mode].title;
  document.getElementById('sub').textContent = schemas[current_mode].subtitle;

  // 模式切换
  const modeBtns = document.querySelectorAll('#modeSwitch button');
  modeBtns.forEach(btn => {
    btn.onclick = () => {
      modeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const m = btn.dataset.mode;
      renderForm(m);
      document.getElementById('promptBox').textContent = '// 填好参数后,点击"生成 prompt"';
    };
  });

  function renderForm(mode) {
    const schema = schemas[mode];
    const form = document.getElementById('configForm');
    form.innerHTML = '';
    document.getElementById('formTitle').textContent = schema.form_title;

    schema.fields.forEach(f => {
      const wrap = document.createElement('div');
      wrap.className = f.row ? 'form-row' : '';
      const col = document.createElement('div');
      col.className = f.row ? '' : 'form-group';
      if (f.row) col.className = 'form-group';

      col.innerHTML = `
        <label for="f_${f.key}">${f.label}${f.required ? ' <span style="color:#ff3b30">*</span>' : ''}</label>
        ${f.type === 'select'
          ? `<select id="f_${f.key}">${f.options.map(o => `<option value="${o.value}" ${defaults[mode][f.key]===o.value?'selected':''}>${o.label}</option>`).join('')}</select>`
          : f.type === 'textarea'
          ? `<textarea id="f_${f.key}" rows="3" placeholder="${f.placeholder||''}">${defaults[mode][f.key]||''}</textarea>`
          : `<input type="${f.type}" id="f_${f.key}" value="${defaults[mode][f.key]||''}" placeholder="${f.placeholder||''}" ${f.required?'required':''}>`
        }
        ${f.hint ? `<div class="hint">${f.hint}</div>` : ''}
      `;
      wrap.appendChild(col);
      form.appendChild(wrap);
    });
  }

  // 生成 4 部分 prompt(按 04 架构师原则 §原则 10)
  document.getElementById('genBtn').onclick = () => {
    const mode = document.querySelector('#modeSwitch button.active').dataset.mode;
    const schema = schemas[mode];
    const fields = {};
    schema.fields.forEach(f => {
      const el = document.getElementById('f_' + f.key);
      fields[f.key] = el ? el.value : '';
    });
    const lines = [];
    lines.push('请按以下参数帮我设置 ' + schema.entity_type);
    lines.push('');
    schema.fields.forEach(f => {
      lines.push('  ' + f.label + ': ' + (fields[f.key] || '(空)'));
    });
    lines.push('');
    // 模板 + 简单字符串替换
    let cmd = schema.exec_cmd_template || '';
    cmd = cmd.replace(/\{(\w+)\}/g, (m, k) => fields[k] !== undefined ? fields[k] : m);
    // 可选 note 的特殊处理
    if (schema.exec_cmd_optional && fields.note) cmd = cmd.replace(' + note + ', fields.note);
    lines.push('执行命令: ' + cmd);
    document.getElementById('promptBox').textContent = lines.join('\n');
  };

  // 复制
  document.getElementById('copyBtn').onclick = function() {
    const text = document.getElementById('promptBox').textContent;
    if (text.startsWith('//')) {
      alert('请先生成 prompt');
      return;
    }
    navigator.clipboard.writeText(text).then(() => {
      this.textContent = '✓ 已复制';
      setTimeout(() => this.textContent = '📋 复制 prompt', 2000);
    });
  };

  // 初始 render
  renderForm(current_mode);
})();
</script>

</body>
</html>
