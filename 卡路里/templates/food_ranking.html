<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>食物排行榜 · 卡路里</title>
<style>
:root{
  --fg:#1d1d1f;--fg2:#6e6e73;--fg3:#86868b;
  --bg:#fafafa;--card:#fff;--border:#d2d2d7;
  --accent:#0071e3;--accent-soft:#f5f5f7;
  --green:#34c759;--orange:#FF9500;--red:#FF3B30;--purple:#AF52DE;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);color:var(--fg);
  line-height:1.7;-webkit-font-smoothing:antialiased;
}
.wrap{max-width:960px;margin:0 auto;padding:40px 24px 80px}

.hero{
  background:linear-gradient(180deg,#fff 0%,var(--accent-soft) 100%);
  padding:32px 32px 28px;border-radius:20px;
  margin-bottom:24px;box-shadow:var(--shadow);
  text-align:center;
}
.hero h1{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:8px}
.hero .sub{font-size:14px;color:var(--fg2)}

/* TAB 5 个榜单 */
.tabs{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  margin-bottom:24px;
}
.tab{
  background:var(--card);border:1px solid var(--border);
  padding:8px 16px;border-radius:999px;
  font-family:inherit;font-size:13px;font-weight:500;
  color:var(--fg2);cursor:pointer;
  transition:all .15s;
}
.tab:hover{border-color:var(--accent);color:var(--fg)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* 时间范围 */
.range-bar{
  display:flex;align-items:center;justify-content:center;
  gap:12px;font-size:13px;color:var(--fg2);
  margin-bottom:20px;
}
.range-bar strong{color:var(--fg);font-weight:600;font-size:15px;margin:0 8px}

/* TABLE */
table{
  width:100%;border-collapse:collapse;
  background:var(--card);border-radius:14px;
  overflow:hidden;box-shadow:var(--shadow);
  margin-bottom:20px;
}
thead{background:var(--accent-soft)}
th{
  text-align:left;padding:12px 14px;font-size:12px;
  font-weight:600;color:var(--fg);border-bottom:1px solid var(--border);
  text-transform:uppercase;letter-spacing:.5px;
}
td{
  padding:14px;border-bottom:1px solid #ececec;
  font-size:14px;vertical-align:middle;
}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--accent-soft)}
.rank{
  width:32px;height:32px;border-radius:50%;
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;font-size:14px;
}
.rank.r1{background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff}
.rank.r2{background:linear-gradient(135deg,#C0C0C0,#A8A8A8);color:#fff}
.rank.r3{background:linear-gradient(135deg,#CD7F32,#A0522D);color:#fff}
.rank.rx{background:var(--bg);color:var(--fg3)}
.food-name{font-weight:600;color:var(--fg)}
.food-meta{font-size:11px;color:var(--fg3);margin-top:2px}
.cal-cell{font-weight:700;color:var(--fg);font-size:16px}
.cnt-cell{color:var(--accent);font-weight:600}

/* NUTRI BAR */
.nutri-bar{
  display:flex;height:6px;border-radius:3px;
  overflow:hidden;margin-top:4px;
}
.nutri-bar .p{height:100%}
.nutri-bar .protein{background:var(--accent)}
.nutri-bar .carb{background:var(--green)}
.nutri-bar .fat{background:var(--orange)}
.nutri-meta{
  font-size:10px;color:var(--fg3);margin-top:2px;
  font-family:"SF Mono",monospace;
}

/* COPY */
.copy-section{
  background:var(--card);border-radius:14px;
  padding:16px 20px;margin-top:20px;
  box-shadow:var(--shadow);
}
.copy-section h3{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--fg2)}
.copy-section pre{
  background:#1d1d1f;color:#f5f5f7;
  padding:12px 16px;border-radius:10px;
  font-size:11.5px;line-height:1.55;
  overflow-x:auto;margin:6px 0 10px;
  font-family:"SF Mono",monospace;white-space:pre-wrap;
}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--accent);color:#fff;
  padding:7px 14px;border-radius:8px;
  font-size:12px;font-weight:600;
  border:none;cursor:pointer;
}
.btn:hover{opacity:.85}
.btn.copied{background:var(--green)}

#backTop{
  position:fixed;bottom:24px;right:24px;
  background:var(--card);color:var(--accent);
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;box-shadow:var(--shadow);
  font-size:18px;border:1px solid var(--border);
}

footer{
  text-align:center;color:var(--fg3);
  font-size:12px;padding-top:28px;
  border-top:1px solid var(--border);margin-top:36px;
}

@media (max-width:640px){
  .wrap{padding:24px 16px 60px}
  .hero{padding:24px 20px;border-radius:16px}
  .hero h1{font-size:22px}
  .tabs{gap:6px}
  .tab{padding:6px 12px;font-size:12px}
  th,td{padding:8px 10px;font-size:13px}
}
</style>
</head>
<body>
<div class="wrap">

<header class="hero">
  <h1 id="title">🍽️ 食物排行榜</h1>
  <div class="sub" id="subtitle">加载中...</div>
</header>

<div class="tabs" id="tabs">
  <button class="tab active" data-cat="high_calorie">🔥 热量炸弹榜</button>
  <button class="tab" data-cat="low_calorie">🥬 低热量健康榜</button>
  <button class="tab" data-cat="frequent">📅 频繁吃榜</button>
  <button class="tab" data-cat="high_carb">🍚 高碳水榜</button>
  <button class="tab" data-cat="high_protein">💪 高蛋白榜</button>
</div>

<div class="range-bar" id="rangeBar">
  时间范围: <strong id="rangeStart">--</strong> ~ <strong id="rangeEnd">--</strong>
</div>

<table>
  <thead id="thead"></thead>
  <tbody id="tbody"></tbody>
</table>

<div class="copy-section">
  <h3>📤 复制回 AI（让 AI 帮你解读）</h3>
  <pre id="copyText">加载中...</pre>
  <button class="btn" id="copyBtn" onclick="copyToAI()">复制榜单</button>
</div>

<footer>
  卡路里 Skill · 食物排行榜 · 5 榜单共用模板（1 模板 5 参数）<br>
  模板：templates/food_ranking.html
</footer>

</div>
<a id="backTop" href="#top" title="回到顶部">↑</a>

<!--INJECT-DATA-->

<script>
const DATA = (() => {
  if (typeof window.__DATA__ !== 'object' || window.__DATA__ === null) return null;
  return window.__DATA__;
})();

function escapeHTML(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

function copyToAI() {
  const text = document.getElementById('copyText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制榜单'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

/* ====== 5 榜单配置 ====== */
const CATEGORIES = {
  high_calorie:  { label: '高热量', thead: ['排名', '食物名', '总热量', '次数', '均热量/次', '营养结构'] },
  low_calorie:   { label: '低热量', thead: ['排名', '食物名', '总热量', '次数', '均热量/次', '营养结构'] },
  frequent:      { label: '频繁吃', thead: ['排名', '食物名', '次数', '总热量', '均热量/次', '营养结构'] },
  high_carb:     { label: '高碳水', thead: ['排名', '食物名', '总碳水', '次数', '总热量', '营养结构'] },
  high_protein:  { label: '高蛋白', thead: ['排名', '食物名', '总蛋白', '次数', '总热量', '营养结构'] },
};

const METRIC_FIELDS = {
  high_calorie:  (it) => `${it.total_cal} 卡`,
  low_calorie:   (it) => `${it.total_cal} 卡`,
  frequent:      (it) => `${it.cnt} 次`,
  high_carb:     (it) => `${it.total_carbs} 克`,
  high_protein:  (it) => `${it.total_protein} 克`,
};

const CALORIE_FIELDS = {
  high_calorie:  (it) => `${it.avg_cal_per_meal} 卡`,
  low_calorie:   (it) => `${it.avg_cal_per_meal} 卡`,
  frequent:      (it) => `${it.total_cal} 卡`,
  high_carb:     (it) => `${it.total_cal} 卡`,
  high_protein:  (it) => `${it.total_cal} 卡`,
};

let currentData = null;

function renderCategory(catKey) {
  if (!DATA) return;
  const items = (DATA[catKey] && DATA[catKey].items) || [];
  const meta = CATEGORIES[catKey];
  document.getElementById('title').textContent = (DATA[catKey] && DATA[catKey].title) || '🍽️ 食物排行榜';
  document.getElementById('subtitle').textContent =
    `${meta.label} · ${items.length} 个食物 · ${(DATA[catKey] && DATA[catKey].start) || ''} ~ ${(DATA[catKey] && DATA[catKey].end) || ''}`;

  // Thead
  const thead = document.getElementById('thead');
  thead.innerHTML = '<tr>' + meta.thead.map(h => `<th>${h}</th>`).join('') + '</tr>';

  // Tbody
  const tbody = document.getElementById('tbody');
  if (items.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:30px;color:var(--fg3)">无数据</td></tr>';
    return;
  }

  tbody.innerHTML = items.map((it, i) => {
    const rankCls = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rx';
    // 营养结构
    const total = (it.total_protein * 4) + (it.total_carbs * 4) + (it.total_fat * 9);
    const pp = total > 0 ? Math.round(it.total_protein * 4 / total * 100) : 0;
    const cp = total > 0 ? Math.round(it.total_carbs * 4 / total * 100) : 0;
    const fp = total > 0 ? Math.round(it.total_fat * 9 / total * 100) : 0;

    const metricFn = METRIC_FIELDS[catKey] || ((x) => '');
    const calFn = CALORIE_FIELDS[catKey] || ((x) => '');

    return `
      <tr>
        <td><span class="rank ${rankCls}">${i + 1}</span></td>
        <td>
          <div class="food-name">${escapeHTML(it.food_name)}</div>
          <div class="food-meta">总 ${it.total_grams}g</div>
        </td>
        <td class="cal-cell">${escapeHTML(metricFn(it))}</td>
        <td class="cnt-cell">${escapeHTML(calFn(it))}</td>
        <td>${it.cnt} 次</td>
        <td>
          <div class="nutri-bar">
            <div class="p protein" style="width:${pp}%"></div>
            <div class="p carb" style="width:${cp}%"></div>
            <div class="p fat" style="width:${fp}%"></div>
          </div>
          <div class="nutri-meta">蛋 ${pp}% / 碳 ${cp}% / 脂 ${fp}%</div>
        </td>
      </tr>
    `;
  }).join('');

  // Copy
  let txt = `${meta.label}（${(DATA[catKey] && DATA[catKey].start) || ''} ~ ${(DATA[catKey] && DATA[catKey].end) || ''}）\n`;
  items.forEach((it, i) => {
    txt += `  ${i + 1}. ${it.food_name} - ${metricFn(it)} / ${calFn(it)}\n`;
  });
  document.getElementById('copyText').textContent = txt;

  // Tabs active
  document.querySelectorAll('#tabs .tab').forEach(t => {
    t.classList.toggle('active', t.dataset.cat === catKey);
  });
}

function init() {
  if (!DATA) {
    document.getElementById('title').textContent = '❌ 数据加载失败';
    return;
  }

  const firstCat = 'high_calorie';
  const firstData = DATA[firstCat] || {};
  document.getElementById('rangeStart').textContent = firstData.start || '—';
  document.getElementById('rangeEnd').textContent = firstData.end || '—';

  document.querySelectorAll('#tabs .tab').forEach(t => {
    t.onclick = () => renderCategory(t.dataset.cat);
  });

  renderCategory(firstCat);
}

init();
</script>
</body>
</html>
