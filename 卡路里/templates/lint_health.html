<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡路里 · 数据健康检查</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --fg:#1d1d1f; --fg2:#6e6e73; --fg3:#86868b; --bg:#fafafa;
    --card:#fff; --border:#d2d2d7; --accent:#0071e3;
    --good:#34c759; --warn:#ff9500; --bad:#ff3b30; --soft:#f5f5f7;
  }
  body { font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
         line-height:1.6; color:var(--fg); background:var(--bg);
         max-width:920px; margin:0 auto; padding:48px 24px 80px;
         -webkit-font-smoothing:antialiased; }
  h1 { font-size:28px; font-weight:700; letter-spacing:-.02em; margin-bottom:4px; }
  .sub { font-size:14px; color:var(--fg3); margin-bottom:24px; }
  .pill { display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; font-weight:600; margin-right:4px; }
  .pill-good { background:rgba(52,199,89,.15); color:var(--good); }
  .pill-warn { background:rgba(255,149,0,.15); color:var(--warn); }
  .pill-bad  { background:rgba(255,59,48,.15); color:var(--bad); }
  .pill-info { background:rgba(0,113,227,.15); color:var(--accent); }
  .kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
  .kpi { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px 18px; text-align:center; }
  .kpi .label { font-size:12px; color:var(--fg2); margin-bottom:4px; }
  .kpi .value { font-size:30px; font-weight:700; }
  .kpi.good .value { color:var(--good); }
  .kpi.warn .value { color:var(--warn); }
  .kpi.bad .value  { color:var(--bad); }
  .kpi .extra { font-size:11px; color:var(--fg3); margin-top:4px; }
  .section { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:22px 26px; margin-bottom:14px; }
  /* 单项 Lint 卡片 */
  .lint-card { display:flex; gap:16px; align-items:flex-start; padding:16px 18px;
               border-radius:12px; border:1px solid var(--border); margin:10px 0; background:var(--card); }
  .lint-card.good  { border-left:4px solid var(--good); }
  .lint-card.warn  { border-left:4px solid var(--warn); }
  .lint-card.bad   { border-left:4px solid var(--bad); }
  .lint-icon { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center;
                color:#fff; font-weight:700; font-size:14px; flex-shrink:0; }
  .lint-icon.good { background:var(--good); }
  .lint-icon.warn { background:var(--warn); }
  .lint-icon.bad  { background:var(--bad); }
  .lint-content { flex:1; }
  .lint-title { font-weight:600; font-size:14px; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
  .lint-desc { font-size:12.5px; color:var(--fg2); margin-bottom:6px; }
  .lint-suggest { font-size:12px; background:var(--soft); padding:6px 10px; border-radius:6px; color:var(--fg2); }
  .lint-suggest strong { color:var(--accent); }
  .section h2 { font-size:17px; font-weight:600; margin-bottom:12px; }
  .footer { margin-top:24px; padding:14px 18px; background:var(--soft); border-radius:12px; display:flex; justify-content:space-between; align-items:center; }
  .footer .src { font-size:12px; color:var(--fg3); }
  .btn { border:1px solid var(--border); background:var(--card); padding:6px 12px; border-radius:8px; cursor:pointer; font-size:12px; color:var(--fg); }
  .btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
  .meta-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .meta-bar .left { font-size:12px; color:var(--fg2); }
  .meta-bar .type-badge { font-size:11px; padding:3px 10px; border-radius:6px; background:var(--soft); color:var(--fg2); font-weight:600; }
</style>
</head>
<body>

<!--INJECT-DATA-->

<div class="meta-bar">
  <div class="left" id="metaLeft">--</div>
  <div class="type-badge">报告型 · 5 项 Lint</div>
</div>

<h1>🩺 数据健康检查</h1>
<p class="sub" id="sub">--</p>

<div class="kpi-grid">
  <div class="kpi good"><div class="label">✓ 正常</div><div class="value" id="kGood">0</div><div class="extra">项</div></div>
  <div class="kpi warn"><div class="label">⚠ 警告</div><div class="value" id="kWarn">0</div><div class="extra">项</div></div>
  <div class="kpi bad"><div class="label">✗ 严重</div><div class="value" id="kBad">0</div><div class="extra">项</div></div>
</div>

<div class="section">
  <h2>5 项检查详情</h2>
  <div id="lints"></div>
</div>

<div class="footer">
  <div class="src" id="srcLine">🩺 数据来源:--</div>
  <button class="btn" id="copyBtn">📋 复制问题清单</button>
</div>

<script>
(function(){
  const D = window.__DATA__;
  if (!D || D.status !== 'ok') {
    document.body.innerHTML = '<div style="padding:60px;text-align:center;color:#86868b">⚠ 数据未注入或状态非 ok</div>';
    return;
  }
  const { summary, items, meta } = D.data;

  document.getElementById('metaLeft').textContent =
    `检查 ${meta.check_at} · 5 项 Lint · 按用户数据即时计算`;
  const issues = items.filter(i => i.status !== 'good').length;
  document.getElementById('sub').innerHTML = `查卡路里数据 · ${issues === 0 ? '<span class="pill pill-good">✓ 全部健康</span>' : '<span class="pill pill-warn">⚠ ' + issues + ' 项需关注</span>'}`;

  // KPI
  document.getElementById('kGood').textContent = summary.good_count;
  document.getElementById('kWarn').textContent = summary.warn_count;
  document.getElementById('kBad').textContent = summary.bad_count;

  // 5 项 Lint 卡片
  const container = document.getElementById('lints');
  items.forEach(it => {
    const iconChar = it.status === 'good' ? '✓' : it.status === 'warn' ? '⚠' : '✗';
    const statusLabel = it.status === 'good' ? '正常' : it.status === 'warn' ? '警告' : '严重';
    container.insertAdjacentHTML('beforeend',
      `<div class="lint-card ${it.status}">` +
      `<div class="lint-icon ${it.status}">${iconChar}</div>` +
      `<div class="lint-content">` +
      `<div class="lint-title">${it.title} <span class="pill pill-${it.status === 'warn' ? 'warn' : it.status === 'bad' ? 'bad' : 'good'}">${statusLabel}</span></div>` +
      `<div class="lint-desc">${it.description}</div>` +
      `<div class="lint-suggest"><strong>建议:</strong> ${it.suggestion}</div>` +
      `</div></div>`);
  });

  document.getElementById('srcLine').textContent =
    `🩺 数据来源:lint_check · ${meta.check_at} · 5 项即时计算`;

  document.getElementById('copyBtn').onclick = function() {
    const lines = items.filter(i => i.status !== 'good').map(i =>
      `[${i.status === 'warn' ? '⚠' : '✗'}] ${i.title}\n    ${i.description}\n    建议:${i.suggestion}`);
    const r = `卡路里数据健康检查 ${meta.check_at}\n` +
              `正常 ${summary.good_count} / 警告 ${summary.warn_count} / 严重 ${summary.bad_count}\n\n` +
              (lines.length ? lines.join('\n\n') : '✓ 全部健康,无需调整');
    navigator.clipboard.writeText(r).then(() => {
      this.textContent = '✓ 已复制';
      setTimeout(() => this.textContent = '📋 复制问题清单', 2000);
    });
  };
})();
</script>

</body>
</html>
