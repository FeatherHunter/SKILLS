<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning System - 模块依赖图</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px;line-height:1.6;}
a{color:#0066cc;text-decoration:none;}
a:hover{text-decoration:underline;}
.header{background:#fff;border-bottom:1px solid #ddd;padding:16px 24px;position:sticky;top:0;z-index:100;}
.header h1{font-size:24px;font-weight:600;margin-bottom:12px;}
.search-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.search-row input{padding:8px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;width:200px;}
.filter-btns{display:flex;gap:8px;flex-wrap:wrap;}
.filter-btns button{padding:8px 16px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:14px;min-height:44px;}
.filter-btns button.active{background:#0066cc;color:#fff;border-color:#0066cc;}
.filter-btns button:hover{background:#e6f0fa;}
.filter-btns button.active:hover{background:#0052a3;}
.main-layout{display:flex;min-height:calc(100vh - 140px);}
.graph-area{flex:1;padding:20px;overflow:auto;position:relative;background:#fff;margin:16px;border-radius:8px;border:1px solid #ddd;}
.nav-links{margin-top:12px;display:flex;gap:16px;font-size:13px;}
.svg-container{width:100%;min-width:800px;height:600px;position:relative;}
svg{width:100%;height:100%;}
.module-node{cursor:pointer;transition:all 0.2s;}
.module-node rect{stroke:#333;stroke-width:1.5;rx:8;fill:#fff;transition:all 0.2s;}
.module-node.core rect{fill:#1a3a5c;color:#fff;stroke:#0d2137;}
.module-node.learning rect{fill:#e8f4e8;stroke:#2e7d32;}
.module-node.mastery rect{fill:#fff3e0;stroke:#e65100;}
.module-node.review rect{fill:#e3f2fd;stroke:#1565c0;}
.module-node.integration rect{fill:#f3e5f5;stroke:#6a1b9a;}
.module-node:hover rect{stroke-width:3;filter:drop-shadow(2px 2px 4px rgba(0,0,0,0.3));}
.module-node.selected rect{stroke-width:3;stroke:#ff6600;filter:drop-shadow(0 0 8px rgba(255,102,0,0.5));}
.module-node.dimmed{opacity:0.25;}
.module-node text{font-size:12px;fill:#1a1a1a;pointer-events:none;}
.module-node.core text{fill:#fff;}
.arrow-line{stroke:#666;stroke-width:1.5;fill:none;marker-end:url(#arrowhead);}
.arrow-line.dimmed{opacity:0.15;}
.tooltip{position:absolute;background:#333;color:#fff;padding:10px 14px;border-radius:6px;font-size:13px;max-width:260px;pointer-events:none;z-index:50;display:none;line-height:1.5;}
.tooltip b{display:block;margin-bottom:4px;font-size:14px;}
.detail-panel{width:0;min-width:0;transition:width 0.3s;overflow:hidden;background:#fff;border-left:1px solid #ddd;position:relative;}
.detail-panel.open{min-width:340px;width:340px;}
.detail-panel-inner{padding:20px;width:340px;overflow-y:auto;max-height:calc(100vh - 160px);}
.detail-panel h2{font-size:20px;margin-bottom:8px;color:#1a3a5c;}
.detail-panel h3{font-size:16px;margin-top:16px;margin-bottom:8px;color:#333;border-bottom:1px solid #eee;padding-bottom:4px;}
.detail-panel p{font-size:14px;color:#444;margin-bottom:8px;}
.detail-panel .tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;margin:2px;background:#e0e0e0;color:#333;}
.detail-panel .tag.core{background:#1a3a5c;color:#fff;}
.detail-panel .tag.learning{background:#e8f4e8;color:#2e7d32;}
.detail-panel .tag.mastery{background:#fff3e0;color:#e65100;}
.detail-panel .tag.review{background:#e3f2fd;color:#1565c0;}
.detail-panel .tag.integration{background:#f3e5f5;color:#6a1b9a;}
.detail-panel ul{list-style:none;padding-left:0;}
.detail-panel li{padding:6px 0;font-size:14px;border-bottom:1px solid #f0f0f0;}
.detail-panel li a{color:#0066cc;}
.detail-panel .close-btn{position:absolute;top:12px;right:12px;background:none;border:none;font-size:20px;cursor:pointer;padding:8px;min-height:44px;min-width:44px;color:#666;}
.bottom-nav{background:#fff;border-top:1px solid #ddd;padding:12px 24px;display:flex;gap:20px;font-size:13px;flex-wrap:wrap;}
</style>
</head>
<body>
<div class="header">
  <h1>模块依赖图</h1>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="搜索模块名称..." oninput="filterModules()">
    <div class="filter-btns">
      <button class="active" data-type="all" onclick="setFilter('all')">全部</button>
      <button data-type="core" onclick="setFilter('core')">核心</button>
      <button data-type="learning" onclick="setFilter('learning')">学习</button>
      <button data-type="mastery" onclick="setFilter('mastery')">精通</button>
      <button data-type="review" onclick="setFilter('review')">复习</button>
      <button data-type="integration" onclick="setFilter('integration')">整合</button>
    </div>
  </div>
  <div class="nav-links">
    <a href="LS_00_总览.html">返回总览</a>
  </div>
</div>
<div class="main-layout">
  <div class="graph-area" id="graphArea">
    <div class="svg-container">
      <svg viewBox="0 0 900 650" id="dependencySvg">
        <defs>
          <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
          </marker>
        </defs>
        <!-- Arrow lines will be drawn by JS -->
        <g id="arrowsLayer"></g>
        <!-- Module nodes will be drawn by JS -->
        <g id="nodesLayer"></g>
      </svg>
    </div>
    <div class="tooltip" id="tooltip"></div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <button class="close-btn" onclick="closeDetail()">X</button>
    <div class="detail-panel-inner" id="detailContent"></div>
  </div>
</div>
<div class="bottom-nav">
  <a href="LS_00_总览.html">总览</a>
  <a href="LS_01_数据库架构.html">数据库架构</a>
  <a href="LS_02_模块依赖图.html">模块依赖图</a>
  <a href="LS_03_用户入口流向.html">用户入口流向</a>
  <a href="LS_04_脚本API说明.html">脚本API说明</a>
</div>
<script>
const modules = [
  {id:"ls-data-structure",name:"ls-data-structure",label:"核心数据结构",type:"core",x:380,y:30,w:140,h:50,desc:"所有模块依赖的核心基础设施，定义数据表结构和ORM模型",loadTime:"模块加载时立即初始化",deps:[],tables:["knowledge","progress","review","integration"],"related":["ls-learning-flow","ls-mastery-flow","ls-review-flow","ls-content-mgmt","ls-integration"]},
  {id:"ls-learning-flow",name:"ls-learning-flow",label:"学习流程",type:"learning",x:100,y:150,w:140,h:50,desc:"七阶段学习法的流程编排，协调阶段1-4和来源准备",loadTime:"用户发起学习新知识时加载",deps:["ls-data-structure","llm-wiki"],tables:[],children:["ls-stage-1","ls-stage-2","ls-stage-3","ls-stage-4","ls-source-prep"],"related":[]},
  {id:"ls-stage-1",name:"ls-stage-1",label:"阶段1-目标设定",type:"learning",x:30,y:250,w:120,h:40,desc:"确定学习目标、设定SMART目标、记录到progress表",loadTime:"学习流程启动时",deps:["ls-learning-flow"],tables:["progress"],"related":[]},
  {id:"ls-stage-2",name:"ls-stage-2",label:"阶段2-来源准备",type:"learning",x:180,y:250,w:120,h:40,desc:"搜索整理相关wiki条目，为学习准备素材",loadTime:"阶段1完成后",deps:["ls-learning-flow","ls-source-prep"],tables:[],children:["ls-source-prep"],"related":[]},
  {id:"ls-stage-3",name:"ls-stage-3",label:"阶段3-知识获取",type:"learning",x:330,y:250,w:120,h:40,desc:"通过LLM获取知识、提取关键点、生成理解摘要",loadTime:"阶段2完成后",deps:["ls-learning-flow"],tables:["knowledge"],"related":[]},
  {id:"ls-stage-4",name:"ls-stage-4",label:"阶段4-消化整合",type:"learning",x:480,y:250,w:120,h:40,desc:"将获取的知识消化吸收，整合到个人知识体系中",loadTime:"阶段3完成后",deps:["ls-learning-flow"],tables:["knowledge"],"related":[]},
  {id:"ls-source-prep",name:"ls-source-prep",label:"来源准备",type:"learning",x:630,y:250,w:120,h:40,desc:"搜索相关wiki条目，整理为学习素材输入",loadTime:"阶段2触发或独立调用",deps:["ls-learning-flow"],tables:[],related:[]},
  {id:"ls-mastery-flow",name:"ls-mastery-flow",label:"精通流程",type:"mastery",x:380,y:150,w:140,h:50,desc:"精通流程的编排，协调阶段5-7的循环训练",loadTime:"用户发起精通训练时加载",deps:["ls-data-structure","llm-wiki"],tables:[],children:["ls-stage-5","ls-stage-6","ls-stage-7"],"related":[]},
  {id:"ls-stage-5",name:"ls-stage-5",label:"阶段5-强化训练",type:"mastery",x:310,y:250,w:120,h:40,desc:"通过刻意练习强化知识，生成训练题目",loadTime:"精通流程启动时",deps:["ls-mastery-flow"],tables:["progress"],"related":[]},
  {id:"ls-stage-6",name:"ls-stage-6",label:"阶段6-遗忘对抗",type:"mastery",x:450,y:250,w:120,h:40,desc:"生成间隔重复计划，对抗遗忘曲线",loadTime:"阶段5完成后",deps:["ls-mastery-flow"],tables:["review"],"related":[]},
  {id:"ls-stage-7",name:"ls-stage-7",label:"阶段7-精通验证",type:"mastery",x:590,y:250,w:120,h:40,desc:"验证是否达到精通水平，更新mastery记录",loadTime:"阶段6完成后",deps:["ls-mastery-flow"],tables:["progress"],"related":[]},
  {id:"ls-review-flow",name:"ls-review-flow",label:"复习流程",type:"review",x:680,y:150,w:140,h:50,desc:"复习的整体编排，协调基础复习和精通复习",loadTime:"用户发起复习时加载",deps:["ls-data-structure","llm-wiki","ls-review-basic","ls-review-mastery","ls-review-writeback"],tables:[],children:["ls-review-basic","ls-review-psychology","ls-review-mastery","ls-review-writeback"],"related":[]},
  {id:"ls-review-basic",name:"ls-review-basic",label:"基础复习",type:"review",x:620,y:250,w:100,h:40,desc:"基础知识点复习，生成复习计划和题目",loadTime:"复习流程启动时",deps:["ls-review-flow"],tables:["review"],"related":[]},
  {id:"ls-review-psychology",name:"ls-review-psychology",label:"复习心理学",type:"review",x:740,y:250,w:100,h:40,desc:"应用认知心理学原理优化复习策略",loadTime:"复习流程中",deps:["ls-review-flow"],tables:[],related":[]},
  {id:"ls-review-mastery",name:"ls-review-mastery",label:"精通复习",type:"review",x:780,y:350,w:100,h:40,desc:"针对精通阶段的知识点进行复习",loadTime:"基础复习完成后",deps:["ls-review-flow"],tables:["review"],"related":[]},
  {id:"ls-review-writeback",name:"ls-review-writeback",label:"复习写入",type:"review",x:780,y:430,w:100,h:40,desc:"将复习结果写入数据库，更新下次复习时间",loadTime:"复习完成后",deps:["ls-review-flow"],tables:["review"],"related":[]},
  {id:"ls-content-mgmt",name:"ls-content-mgmt",label:"内容管理",type:"integration",x:100,y:400,w:140,h:50,desc:"知识内容的增删改查，标签管理和内容审核",loadTime:"内容操作时加载",deps:["ls-data-structure","llm-wiki"],tables:["knowledge"],"related":[]},
  {id:"ls-integration",name:"ls-integration",label:"能力整合",type:"integration",x:300,y:400,w:140,h:50,desc:"跨知识领域整合，形成综合能力",loadTime:"整合任务时加载",deps:["ls-data-structure","llm-wiki"],tables:["integration"],"related":[]},
  {id:"llm-wiki",name:"llm-wiki",label:"LLM-WIKI",type:"core",x:580,y:30,w:100,h:40,desc:"知识库模块，提供知识搜索和读取能力",loadTime:"全局可用",deps:[],tables:[],related:[]}
];

let currentFilter = 'all';
let currentSearch = '';
let selectedId = null;

function getColor(type){
  const map={core:'#1a3a5c',learning:'#2e7d32',mastery:'#e65100',review:'#1565c0',integration:'#6a1b9a'};
  return map[type]||'#666';
}
function getBgColor(type){
  const map={core:'#1a3a5c',learning:'#e8f4e8',mastery:'#fff3e0',review:'#e3f2fd',integration:'#f3e5f5'};
  return map[type]||'#fff';
}

function drawGraph(){
  const svg=document.getElementById('dependencySvg');
  const arrowsLayer=document.getElementById('arrowsLayer');
  const nodesLayer=document.getElementById('nodesLayer');
  arrowsLayer.innerHTML='';
  nodesLayer.innerHTML='';

  // Draw arrows first
  modules.forEach(mod=>{
    mod.deps.forEach(depId=>{
      const dep=modules.find(m=>m.id===depId);
      if(!dep)return;
      const x1=mod.x+mod.w/2;
      const y1=mod.y;
      const x2=dep.x+dep.w/2;
      const y2=dep.y+dep.h;
      const line=document.createElementNS('http://www.w3.org/2000/svg','path');
      const mx=(x1+x2)/2;
      const my=(y1+y2)/2;
      line.setAttribute('d',`M ${x1} ${y1} Q ${x1} ${my} ${mx} ${my} T ${x2} ${y2}`);
      line.setAttribute('class','arrow-line'+(selectedId&&selectedId!==mod.id&&selectedId!==depId?' dimmed':''));
      line.setAttribute('data-from',mod.id);
      line.setAttribute('data-to',depId);
      arrowsLayer.appendChild(line);
    });
  });

  // Draw nodes
  modules.forEach(mod=>{
    const filtered=currentFilter!=='all'&&mod.type!==currentFilter;
    const searched=currentSearch&&!mod.name.toLowerCase().includes(currentSearch)&&!mod.label.toLowerCase().includes(currentSearch);
    const dimmed=selectedId&&selectedId!==mod.id&&!mod.deps.includes(selectedId)&&!modules.some(m=>m.id===selectedId&&m.deps.includes(mod.id))&&selectedId!==mod.id;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','module-node '+mod.type+(filtered||searched?' dimmed':'')+(dimmed?' dimmed':'')+(selectedId===mod.id?' selected':''));
    g.setAttribute('data-id',mod.id);
    g.setAttribute('transform',`translate(${mod.x},${mod.y})`);
    g.setAttribute('onclick',`selectModule('${mod.id}')`);
    g.setAttribute('onmouseenter',`showTooltip(event,'${mod.id}')`);
    g.setAttribute('onmouseleave','hideTooltip()');

    const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('width',mod.w);
    rect.setAttribute('height',mod.h);
    rect.setAttribute('rx','8');
    rect.style.fill=getBgColor(mod.type);
    rect.style.stroke=getColor(mod.type);
    rect.style.strokeWidth='1.5';
    g.appendChild(rect);

    const text=document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x',mod.w/2);
    text.setAttribute('y',mod.h/2-6);
    text.setAttribute('text-anchor','middle');
    text.setAttribute('dominant-baseline','middle');
    text.style.fontSize='11px';
    text.style.fill=mod.type==='core'?'#fff':'#1a1a1a';
    text.textContent=mod.label;
    g.appendChild(text);

    const text2=document.createElementNS('http://www.w3.org/2000/svg','text');
    text2.setAttribute('x',mod.w/2);
    text2.setAttribute('y',mod.h/2+8);
    text2.setAttribute('text-anchor','middle');
    text2.setAttribute('dominant-baseline','middle');
    text2.style.fontSize='10px';
    text2.style.fill=mod.type==='core'?'#ccc':'#666';
    text2.textContent=mod.name.replace('ls-','').replace('-',' ');
    g.appendChild(text2);

    nodesLayer.appendChild(g);
  });
}

function selectModule(id){
  selectedId=selectedId===id?null:id;
  drawGraph();
  if(selectedId){
    showDetail(id);
  } else {
    closeDetail();
  }
}

function showDetail(id){
  const mod=modules.find(m=>m.id===id);
  if(!mod)return;
  const panel=document.getElementById('detailPanel');
  const content=document.getElementById('detailContent');
  let html=`<h2>${mod.label}</h2>`;
  html+=`<span class="tag ${mod.type}">${mod.type}</span><p style="margin-top:12px;">${mod.desc}</p>`;
  html+=`<h3>加载时机</h3><p>${mod.loadTime}</p>`;
  if(mod.deps.length>0){
    html+=`<h3>依赖模块</h3><ul>`;
    mod.deps.forEach(did=>{
      const dep=modules.find(m=>m.id===did);
      if(dep)html+=`<li><a href="#" onclick="selectModule('${did}');return false;">${dep.label}</a></li>`;
    });
    html+=`</ul>`;
  }
  if(mod.tables.length>0){
    html+=`<h3>涉及表</h3><ul>`;
    mod.tables.forEach(t=>{html+=`<li><a href="LS_01_数据库架构.html#${t}">${t}</a></li>`;});
    html+=`</ul>`;
  }
  if(mod.children&&mod.children.length>0){
    html+=`<h3>子模块</h3><ul>`;
    mod.children.forEach(cid=>{
      const child=modules.find(m=>m.id===cid);
      if(child)html+=`<li><a href="#" onclick="selectModule('${cid}');return false;">${child.label}</a></li>`;
    });
    html+=`</ul>`;
  }
  if(mod.related&&mod.related.length>0){
    html+=`<h3>相关模块</h3><ul>`;
    mod.related.forEach(rid=>{
      const rel=modules.find(m=>m.id===rid);
      if(rel)html+=`<li><a href="#" onclick="selectModule('${rid}');return false;">${rel.label}</a></li>`;
    });
    html+=`</ul>`;
  }
  content.innerHTML=html;
  panel.classList.add('open');
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('open');
  selectedId=null;
  drawGraph();
}

function showTooltip(e,id){
  const mod=modules.find(m=>m.id===id);
  if(!mod)return;
  const tip=document.getElementById('tooltip');
  tip.innerHTML=`<b>${mod.label}</b>${mod.desc}`;
  tip.style.display='block';
  const rect=e.target.closest('.module-node').getBoundingClientRect();
  const graphRect=document.getElementById('graphArea').getBoundingClientRect();
  tip.style.left=(rect.right-graphRect.left+10)+'px';
  tip.style.top=(rect.top-graphRect.top)+'px';
}

function hideTooltip(){
  document.getElementById('tooltip').style.display='none';
}

function setFilter(type){
  currentFilter=type;
  document.querySelectorAll('.filter-btns button').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.filter-btns button[data-type="${type}"]`).classList.add('active');
  drawGraph();
}

function filterModules(){
  currentSearch=document.getElementById('searchInput').value.toLowerCase();
  drawGraph();
}

drawGraph();
</script>
</body>
</html>
