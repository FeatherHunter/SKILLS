.side-panel{width:0;min-width:0;background:#fff;border-left:1px solid #ddd;transition:width 0.3s;overflow:hidden;flex-shrink:0;}

let currentEntry = 'learn';

function renderFlow(entryId){
  const flow=flows[entryId];
  if(!flow)return;
  const diagram=document.getElementById('flowDiagram');
  diagram.innerHTML='';

  // Draw edges first (lines between nodes)
  flow.edges.forEach((edge,i)=>{
    const fromNode=flow.nodes.find(n=>n.id===edge[0]);
    const toNode=flow.nodes.find(n=>n.id===edge[1]);
    if(!fromNode||!toNode)return;
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.style.position='absolute';
    svg.style.left='0';
    svg.style.top='0';
    svg.style.width='100%';
    svg.style.height='100%';
    svg.style.pointerEvents='none';
    svg.style.zIndex='0';

    const x1=fromNode.x+60;
    const y1=fromNode.y+40;
    const x2=toNode.x+60;
    const y2=toNode.y;
    const path=document.createElementNS('http://www.w3.org/2000/svg','path');
    const mx=(x1+x2)/2;
    const my=(y1+y2)/2;
    path.setAttribute('d',`M ${x1} ${y1} Q ${x1} ${my} ${mx} ${my} T ${x2} ${y2}`);
    path.setAttribute('stroke','#999');
    path.setAttribute('stroke-width','2');
    path.setAttribute('fill','none');
    path.setAttribute('marker-end','url(#arrow)');

    let label='';
    if(edge[2]&&edge[2].cond)label=edge[2].cond;

    svg.innerHTML=`<defs><marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#999"/></marker></defs>`;
    svg.appendChild(path);
    if(label){
      const text=document.createElementNS('http://www.w3.org/2000/svg','text');
      text.setAttribute('x',mx);
      text.setAttribute('y',my-5);
      text.setAttribute('text-anchor','middle');
      text.style.fontSize='11px';
      text.style.fill='#e65100';
      text.textContent=label;
      svg.appendChild(text);
    }
    diagram.appendChild(svg);
  });

  // Draw nodes
  flow.nodes.forEach(node=>{
    const div=document.createElement('div');
    div.className='flow-node '+node.type;
    div.style.left=node.x+'px';
    div.style.top=node.y+'px';
    div.innerHTML=`<div class="node-title">${node.title}</div><div class="node-desc">${node.desc}</div>`;
    div.onclick=()=>showModuleDetail(node.title);
    diagram.appendChild(div);
  });
}

function selectEntry(entryId){
  currentEntry=entryId;
  document.querySelectorAll('.entry-item').forEach(el=>el.classList.remove('active'));
  document.querySelector(`.entry-item[data-entry="${entryId}"]`).classList.add('active');
  renderFlow(entryId);
  showSidePanel(entryId);
}

function showSidePanel(entryId){
  const flow=flows[entryId];
  if(!flow)return;
  const panel=document.getElementById('sidePanel');
  const content=document.getElementById('sideContent');
  let html=`<h2>${flow.title}</h2>`;

  if(flow.cmds&&flow.cmds.length>0){
    html+=`<h3>关键CLI命令</h3>`;
    flow.cmds.forEach(cmd=>{
      html+=`<div class="cmd-box"><code>${cmd.cmd}</code><button class="copy-btn" onclick="copyCmd(this)">复制</button></div>`;
    });
  }

  if(flow.faq&&flow.faq.length>0){
    html+=`<h3>常见问题</h3>`;
    flow.faq.forEach((item,i)=>{
      html+=`<div class="faq-item"><div class="faq-q" onclick="toggleFaq(this)">${item.q}</div><div class="faq-a">${item.a}</div></div>`;
    });
  }

  content.innerHTML=html;
  panel.classList.add('open');
}

function showModuleDetail(name){
  // Could link to LS_02 or show module info
  alert('模块: '+name+'\n查看详情请前往「模块依赖图」页面');
}

function toggleFaq(el){
  el.parentElement.classList.toggle('open');
}

function copyCmd(btn){
  const code=btn.parentElement.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='已复制';
    setTimeout(()=>btn.textContent='复制',1500);
  });
}

function filterEntries(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.entry-item').forEach(el=>{
    const text=el.textContent.toLowerCase();
    el.style.display=text.includes(search)?'':'none';
  });
}

selectEntry('learn');
</script>
</body>
