<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning System - 脚本API说明</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f5f5f5;color:#1a1a1a;font-size:14px;line-height:1.6;}
a{color:#0066cc;text-decoration:none;}
a:hover{text-decoration:underline;}
.header{background:#fff;border-bottom:1px solid #ddd;padding:16px 24px;position:sticky;top:0;z-index:100;}
.header h1{font-size:24px;font-weight:600;margin-bottom:12px;}
.search-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.search-row input{padding:8px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;width:220px;}
.nav-links{margin-top:12px;display:flex;gap:16px;font-size:13px;}
.builder{background:#fff;border:1px solid #ddd;border-radius:8px;padding:20px;margin:0 16px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.builder select,.builder input{padding:10px 12px;border:1px solid #ccc;border-radius:6px;font-size:14px;min-height:44px;}
.builder select{width:180px;}
.builder input{width:280px;}
.builder button{padding:10px 20px;background:#0066cc;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;min-height:44px;}
.builder button:hover{background:#0052a3;}
.builder button.generate{background:#2e7d32;}
.builder button.generate:hover{background:#1b5e20;}
.cmd-preview{background:#1a1a1a;color:#a5d6a7;padding:14px 18px;border-radius:6px;font-family:monospace;font-size:13px;flex:1 1 100%;margin-top:8px;}
.cmd-preview code{word-break:break-all;}
.cmd-preview .copy-btn{background:#444;color:#fff;border:none;border-radius:4px;padding:4px 12px;cursor:pointer;font-size:12px;margin-left:12px;}
.cmd-preview .copy-btn:hover{background:#666;}
.main-area{background:#fff;border:1px solid #ddd;border-radius:8px;margin:0 16px 16px;overflow:hidden;}
.tab-bar{display:flex;border-bottom:1px solid #ddd;background:#fafafa;}
.tab-btn{padding:14px 24px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:500;color:#666;min-height:48px;transition:all 0.15s;}
.tab-btn:hover{background:#f0f0f0;color:#333;}
.tab-btn.active{background:#fff;color:#0066cc;border-bottom:2px solid #0066cc;}
.cmd-list{padding:20px;}
.cmd-item{border:1px solid #e0e0e0;border-radius:8px;margin-bottom:16px;overflow:hidden;}
.cmd-header{padding:12px 16px;background:#f8f8f8;cursor:pointer;min-height:48px;display:flex;justify-content:space-between;align-items:center;}
.cmd-header:hover{background:#f0f0f0;}
.cmd-header h3{font-size:15px;font-weight:600;color:#1a1a1a;}
.cmd-header .cmd-name{color:#0066cc;font-family:monospace;font-size:13px;}
.cmd-body{padding:16px;display:none;border-top:1px solid #e0e0e0;}
.cmd-item.open .cmd-body{display:block;}
.cmd-item.open .cmd-header{background:#e6f0fa;}
.code-block{background:#f5f5f5;border:1px solid #ddd;border-radius:6px;padding:12px 14px;font-family:monospace;font-size:13px;margin:8px 0;white-space:pre-wrap;word-break:break-all;color:#333;}
.params-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;}
.params-table th,.params-table td{padding:8px 12px;text-align:left;border-bottom:1px solid #eee;}
.params-table th{background:#f8f8f8;font-weight:600;color:#333;}
.params-table td code{color:#0066cc;font-family:monospace;}
.example-section{margin-top:12px;}
.example-toggle{color:#0066cc;cursor:pointer;font-size:13px;padding:8px 0;display:inline-flex;align-items:center;gap:4px;}
.example-toggle::before{content:'▶';font-size:10px;}
.example-toggle.open::before{content:'▼';}
.example-content{display:none;padding:8px 0;}
.example-content.open{display:block;}
.example-content .example-item{margin:8px 0;padding:10px;background:#f5f5f5;border-radius:6px;border-left:3px solid;}
.example-content .example-item.success{border-color:#2e7d32;}
.example-content .example-item.error{border-color:#c62828;}
.example-content .example-label{font-size:12px;font-weight:600;margin-bottom:4px;color:#666;}
.example-content .example-output{font-family:monospace;font-size:12px;color:#333;white-space:pre-wrap;}
.bottom-nav{background:#fff;border-top:1px solid #ddd;padding:12px 24px;display:flex;gap:20px;font-size:13px;flex-wrap:wrap;}
</style>
</head>
<body>
<div class="header">
  <h1>脚本API说明</h1>
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="搜索命令关键词..." oninput="filterCmds()">
  </div>
  <div class="nav-links">
    <a href="LS_00_总览.html">返回总览</a>
  </div>
</div>
<div class="builder">
  <select id="moduleSelect" onchange="updateActionOptions()">
    <option value="">选择模块</option>
    <option value="knowledge">knowledge (知识管理)</option>
    <option value="progress">progress (进度管理)</option>
    <option value="review">review (复习管理)</option>
    <option value="integration">integration (能力整合)</option>
  </select>
  <select id="actionSelect" onchange="updateTemplate()">
    <option value="">选择动作</option>
  </select>
  <input type="text" id="paramsInput" placeholder="输入参数 (JSON 或 位置参数)">
  <button class="generate" onclick="generateCmd()">生成命令</button>
  <button onclick="copyGenerated()">复制命令</button>
  <div class="cmd-preview" id="cmdPreview" style="display:none;">
    <code id="previewCode"></code>
  </div>
</div>
<div class="main-area">
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="knowledge" onclick="switchTab('knowledge')">knowledge_api</button>
    <button class="tab-btn" data-tab="progress" onclick="switchTab('progress')">progress_api</button>
    <button class="tab-btn" data-tab="review" onclick="switchTab('review')">review_api</button>
    <button class="tab-btn" data-tab="integration" onclick="switchTab('integration')">integration_api</button>
  </div>
  <div class="cmd-list" id="cmdList"></div>
</div>
<div class="bottom-nav">
  <a href="LS_00_总览.html">总览</a>
  <a href="LS_01_数据库架构.html">数据库架构</a>
  <a href="LS_02_模块依赖图.html">模块依赖图</a>
  <a href="LS_03_用户入口流向.html">用户入口流向</a>
  <a href="LS_04_脚本API说明.html">脚本API说明</a>
</div>
<script>
const apiData = {
  knowledge: {
    name: 'knowledge_api',
    desc: '知识管理 - 知识的增删改查、标签管理',
    cmds: [
      {name:'add',desc:'添加新知识',syntax:'python -m ls_cli knowledge add \'{"id","title","language","category","subcategory","framework","tags","metadata"}\'',params:[{key:'id',desc:'知识唯一标识符'},{key:'title',desc:'知识标题'},{key:'language',desc:'编程语言（如 Python/Java）'},{key:'category',desc:'知识分类（如 编程/算法/系统）'},{key:'subcategory',desc:'子分类'},{key:'framework',desc:'所属框架（如 FastAPI/PyTorch）'},{key:'tags',desc:'标签列表（数组）'},{key:'metadata',desc:'元数据（JSON对象）'}],examples:[{type:'success',output:'{"success":true,"id":"knowledge_001","title":"FastAPI入门"}'},{type:'error',output:'{"success":false,"error":"Duplicate ID: knowledge_001 exists"}'}]},
      {name:'list',desc:'列出知识列表',syntax:'python -m ls_cli knowledge list [category] [language]',params:[{key:'category',desc:'可选，筛选分类'},{key:'language',desc:'可选，筛选编程语言'}],examples:[{type:'success',output:'[{"id":"001","title":"Python进阶","language":"Python","category":"编程"},{"id":"002","title":"Go并发","language":"Go","category":"编程"}]'},{type:'error',output:'{"success":false,"error":"Invalid category"}'}]},
      {name:'get',desc:'获取单个知识详情',syntax:'python -m ls_cli knowledge get <id>',params:[{key:'id',desc:'知识ID'}],examples:[{type:'success',output:'{"id":"001","title":"Python进阶","language":"Python","category":"编程","tags":["进阶"],"created":"2025-01-01"}'},{type:'error',output:'{"success":false,"error":"Knowledge not found: 999"}'}]},
      {name:'update',desc:'更新知识内容',syntax:'python -m ls_cli knowledge update <id> <json>',params:[{key:'id',desc:'知识ID'},{key:'json',desc:'更新字段的JSON'}],examples:[{type:'success',output:'{"success":true,"updated":1}'},{type:'error',output:'{"success":false,"error":"Knowledge not found: 999"}'}]},
      {name:'delete',desc:'删除知识（软删除）',syntax:'python -m ls_cli knowledge delete <id>',params:[{key:'id',desc:'知识ID'}],examples:[{type:'success',output:'{"success":true,"deleted":1}'},{type:'error',output:'{"success":false,"error":"Knowledge not found: 999"}'}]}
    ]
  },
  progress: {
    name: 'progress_api',
    desc: '进度管理 - 学习进度的初始化、更新、查询',
    cmds: [
      {name:'init',desc:'初始化学习进度',syntax:'python -m ls_cli progress init <id>',params:[{key:'id',desc:'知识ID'}],examples:[{type:'success',output:'{"success":true,"progress_id":"p001","stage":1,"foundation":null,"mastery":null}'},{type:'error',output:'{"success":false,"error":"Progress already exists for id: 001"}'}]},
      {name:'get',desc:'获取知识进度',syntax:'python -m ls_cli progress get <id>',params:[{key:'id',desc:'知识ID'}],examples:[{type:'success',output:'{"id":"001","stage":3,"foundation":{"status":"completed","score":85},"mastery":{"status":"pending"}}'},{type:'error',output:'{"success":false,"error":"Progress not found for id: 999"}'}]},
      {name:'get_session',desc:'获取当前会话进度',syntax:'python -m ls_cli progress get_session',params:[],examples:[{type:'success',output:'{"session_id":"sess_001","active_id":"001","stage":2,"updated_at":"2025-01-01T10:00:00"}'},{type:'error',output:'{"success":false,"error":"No active session"}'}]},
      {name:'update_session',desc:'更新当前会话',syntax:'python -m ls_cli progress update_session <json>',params:[{key:'json',desc:'会话更新内容'}],examples:[{type:'success',output:'{"success":true,"updated_at":"2025-01-01T10:30:00"}'},{type:'error',output:'{"success":false,"error":"No active session"}'}]},
      {name:'update_stage',desc:'更新学习阶段',syntax:'python -m ls_cli progress update_stage <id> <stage> <json>',params:[{key:'id',desc:'知识ID'},{key:'stage',desc:'阶段编号（1-7）'},{key:'json',desc:'阶段详情JSON'}],examples:[{type:'success',output:'{"success":true,"stage":3}'},{type:'error',output:'{"success":false,"error":"Invalid stage number: 8"}'}]},
      {name:'update_foundation',desc:'更新基础学习记录',syntax:'python -m ls_cli progress update_foundation <id> <json>',params:[{key:'id',desc:'知识ID'},{key:'json',desc:'foundation详情'}],examples:[{type:'success',output:'{"success":true,"foundation":{"status":"completed","score":90,"updated":"2025-01-01"}}'},{type:'error',output:'{"success":false,"error":"Progress not found for id: 999"}'}]},
      {name:'update_mastery',desc:'更新精通记录',syntax:'python -m ls_cli progress update_mastery <id> <json>',params:[{key:'id',desc:'知识ID'},{key:'json',desc:'mastery详情'}],examples:[{type:'success',output:'{"success":true,"mastery":{"level":75,"status":"in_progress"}}'},{type:'error',output:'{"success":false,"error":"Must complete foundation before mastery"}'}]}
    ]
  },
  review: {
    name: 'review_api',
    desc: '复习管理 - 复习计划、轮次记录、遗忘对抗',
    cmds: [
      {name:'create_schedule',desc:'创建复习计划',syntax:'python -m ls_cli review create_schedule <id>',params:[{key:'id',desc:'知识ID'}],examples:[{type:'success',output:'{"success":true,"schedule_id":"rs001","due_dates":["2025-01-05","2025-01-12","2025-01-26"]}'},{type:'error',output:'{"success":false,"error":"Schedule already exists for id: 001"}'}]},
      {name:'get_schedule',desc:'获取复习计划',syntax:'python -m ls_cli review get_schedule <id>',params:[{key:'id',desc:'知识ID'}],examples:[{type:'success',output:'{"id":"001","rounds":[{"round":1,"due":"2025-01-05","status":"completed"},{"round":2,"due":"2025-01-12","status":"pending"}]}'},{type:'error',output:'{"success":false,"error":"Schedule not found for id: 999"}'}]},
      {name:'get_due',desc:'获取今日待复习',syntax:'python -m ls_cli review get_due [date]',params:[{key:'date',desc:'可选，指定日期（YYYY-MM-DD），默认今天'}],examples:[{type:'success',output:'[{"id":"001","title":"Python进阶","due":"2025-01-05","rounds_remaining":3}]'},{type:'error',output:'{"success":false,"error":"Invalid date format"}'}]},
      {name:'complete_round',desc:'完成复习轮次',syntax:'python -m ls_cli review complete_round <id> <round> <score> <questions_count> [duration_minutes] [feedback] [wrong_questions]',params:[{key:'id',desc:'知识ID'},{key:'round',desc:'轮次编号（1-N）'},{key:'score',desc:'评分（1-5）'},{key:'questions_count',desc:'题目数量'},{key:'duration_minutes',desc:'可选，复习时长（分钟）'},{key:'feedback',desc:'可选，反馈文本'},{key:'wrong_questions',desc:'可选，错题ID列表'}],examples:[{type:'success',output:'{"success":true,"next_due":"2025-01-12","score":4,"improvement":true}'},{type:'error',output:'{"success":false,"error":"Round not found: 99 for id: 001"}'}]},
      {name:'get_history',desc:'获取复习历史',syntax:'python -m ls_cli review get_history [id] [limit]',params:[{key:'id',desc:'可选，知识ID'},{key:'limit',desc:'可选，返回条数限制'}],examples:[{type:'success',output:'[{"date":"2025-01-05","round":1,"score":4,"questions_count":5}]'},{type:'error',output:'{"success":false,"error":"No history found"}'}]},
      {name:'add_verification',desc:'添加验证记录',syntax:'python -m ls_cli review add_verification <id> <round> <json>',params:[{key:'id',desc:'知识ID'},{key:'round',desc:'轮次'},{key:'json',desc:'验证详情'}],examples:[{type:'success',output:'{"success":true}'},{type:'error',output:'{"success":false,"error":"Verification already exists for round: 1"}'}]},
      {name:'get_weak',desc:'获取薄弱知识',syntax:'python -m ls_cli review get_weak <id>',params:[{key:'id',desc:'知识ID'}],examples:[{type:'success',output:'{"weak_topics":["并发编程","内存管理"],"recommendations":["建议加强阶段5训练"]}'},{type:'error',output:'{"success":false,"error":"Insufficient review data"}'}]},
      {name:'enable_mastery',desc:'启用精通复习',syntax:'python -m ls_cli review enable_mastery <id>',params:[{key:'id',desc:'知识ID'}],examples:[{type:'success',output:'{"success":true,"mastery_schedule":["2025-01-07","2025-01-14","2025-01-21"]}'},{type:'error',output:'{"success":false,"error":"Foundation not completed"}'}]},
      {name:'record_mastery',desc:'记录精通训练',syntax:'python -m ls_cli review record_mastery <id>',params:[{key:'id',desc:'知识ID'}],examples:[{type:'success',output:'{"success":true,"mastery_level":65}'},{type:'error',output:'{"success":false,"error":"Mastery not enabled"}'}]},
      {name:'get_mastery_status',desc:'获取精通状态',syntax:'python -m ls_cli review get_mastery_status <id>',params:[{key:'id',desc:'知识ID'}],examples:[{type:'success',output:'{"id":"001","mastery_level":75,"stage5_completed":true,"stage6_completed":true,"stage7_completed":false}'},{type:'error',output:'{"success":false,"error":"Mastery not enabled for id: 999"}'}]}
    ]
  },
  integration: {
    name: 'integration_api',
    desc: '能力整合 - 跨知识领域整合方案管理',
    cmds: [
      {name:'create',desc:'创建整合方案',syntax:'python -m ls_cli integration create <json>',params:[{key:'json',desc:'整合方案JSON（含name, knowledge_ids等）'}],examples:[{type:'success',output:'{"success":true,"integration_id":"int001","name":"全栈Python能力"}'},{type:'error',output:'{"success":false,"error":"Invalid knowledge_ids: some ids not found"}'}]},
      {name:'get',desc:'获取整合方案',syntax:'python -m ls_cli integration get <id>',params:[{key:'id',desc:'整合方案ID'}],examples:[{type:'success',output:'{"id":"int001","name":"全栈Python能力","knowledge_ids":["001","002","003"],"solution":"...","created":"2025-01-01"}'},{type:'error',output:'{"success":false,"error":"Integration not found: int999"}'}]},
      {name:'list',desc:'列出所有整合方案',syntax:'python -m ls_cli integration list',params:[],examples:[{type:'success',output:'[{"id":"int001","name":"全栈Python能力"},{"id":"int002","name":"系统设计能力"}]'},{type:'error',output:'{"success":false,"error":"No integrations found"}'}]},
      {name:'update_solution',desc:'更新解决方案',syntax:'python -m ls_cli integration update_solution <id> <summary> <json>',params:[{key:'id',desc:'整合方案ID'},{key:'summary',desc:'方案摘要'},{key:'json',desc:'解决方案详情JSON'}],examples:[{type:'success',output:'{"success":true,"updated_fields":["solution","summary"]}'},{type:'error',output:'{"success":false,"error":"Integration not found: int999"}'}]},
      {name:'stats',desc:'获取整合统计',syntax:'python -m ls_cli integration stats',params:[],examples:[{type:'success',output:'{"total_integrations":5,"total_knowledge_crossed":23,"average_strength":72}'},{type:'error',output:'{"success":false,"error":"No data available"}'}]}
    ]
  }
};

let currentTab = 'knowledge';
let currentSearch = '';

const actionOptions = {
  knowledge: ['add','list','get','update','delete'],
  progress: ['init','get','get_session','update_session','update_stage','update_foundation','update_mastery'],
  review: ['create_schedule','get_schedule','get_due','complete_round','get_history','add_verification','get_weak','enable_mastery','record_mastery','get_mastery_status'],
  integration: ['create','get','list','update_solution','stats']
};

function renderCmdList(tab){
  const data=apiData[tab];
  if(!data)return;
  const list=document.getElementById('cmdList');
  let html='';
  const search=currentSearch.toLowerCase();
  data.cmds.forEach((cmd,i)=>{
    if(search&&!cmd.name.includes(search)&&!cmd.desc.includes(search)&&!cmd.syntax.includes(search))return;
    html+=`<div class="cmd-item" data-index="${i}">
      <div class="cmd-header" onclick="toggleCmd(this)">
        <div><h3>${cmd.name}</h3><span style="color:#666;font-size:13px;">${cmd.desc}</span></div>
        <div style="text-align:right;"><span class="cmd-name">${cmd.name}</span></div>
      </div>
      <div class="cmd-body">
        <div style="font-size:13px;color:#666;margin-bottom:8px;">语法:</div>
        <div class="code-block">${cmd.syntax}</div>
        <table class="params-table">
          <tr><th style="width:120px;">参数</th><th>说明</th></tr>`;
    cmd.params.forEach(p=>{html+=`<tr><td><code>${p.key}</code></td><td>${p.desc}</td></tr>`;});
    if(cmd.params.length===0)html+=`<tr><td colspan="2" style="color:#999;">无参数</td></tr>`;
    html+=`</table>
        <div class="example-section">
          <div class="example-toggle" onclick="toggleExample(this)">示例 (点击展开)</div>
          <div class="example-content">`;
    cmd.examples.forEach(ex=>{
      html+=`<div class="example-item ${ex.type}">
        <div class="example-label">${ex.type==='success'?'成功':'失败'}</div>
        <div class="example-output">${ex.output}</div>
      </div>`;
    });
    html+=`</div></div></div></div>`;
  });
  list.innerHTML=html||'<div style="padding:20px;color:#999;">没有匹配的命令</div>';
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
  renderCmdList(tab);
}

function toggleCmd(el){
  el.parentElement.classList.toggle('open');
}

function toggleExample(el){
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function filterCmds(){
  currentSearch=document.getElementById('searchInput').value.trim();
  renderCmdList(currentTab);
}

function updateActionOptions(){
  const module=document.getElementById('moduleSelect').value;
  const actionSelect=document.getElementById('actionSelect');
  actionSelect.innerHTML='<option value="">选择动作</option>';
  if(module&&actionOptions[module]){
    actionOptions[module].forEach(a=>{
      const opt=document.createElement('option');
      opt.value=a;
      opt.textContent=a;
      actionSelect.appendChild(opt);
    });
  }
  document.getElementById('cmdPreview').style.display='none';
}

function updateTemplate(){
  const module=document.getElementById('moduleSelect').value;
  const action=document.getElementById('actionSelect').value;
  if(!module||!action){
    document.getElementById('cmdPreview').style.display='none';
    return;
  }
  const data=apiData[module];
  if(!data)return;
  const cmd=data.cmds.find(c=>c.name===action);
  if(!cmd){
    document.getElementById('cmdPreview').style.display='none';
    return;
  }
  // Show syntax template as hint
  const preview=document.getElementById('cmdPreview');
  const code=document.getElementById('previewCode');
  code.textContent=cmd.syntax.replace(/<[^>]+>/g,'[参数]');
  preview.style.display='block';
}

function generateCmd(){
  const module=document.getElementById('moduleSelect').value;
  const action=document.getElementById('actionSelect').value;
  const params=document.getElementById('paramsInput').value.trim();
  if(!module||!action){
    alert('请选择模块和动作');
    return;
  }
  const data=apiData[module];
  const cmd=data.cmds.find(c=>c.name===action);
  if(!cmd)return;
  let fullCmd='python -m ls_cli '+module+' '+action;
  if(params)fullCmd+=' '+params;
  const preview=document.getElementById('cmdPreview');
  const code=document.getElementById('previewCode');
  code.textContent=fullCmd;
  preview.style.display='block';
}

function copyGenerated(){
  const code=document.getElementById('previewCode').textContent;
  if(!code){
    alert('先生成命令');
    return;
  }
  navigator.clipboard.writeText(code).then(()=>{
    const btn=document.querySelector('.builder button:last-child');
    const orig=btn.textContent;
    btn.textContent='已复制';
    setTimeout(()=>btn.textContent='复制命令',1500);
  });
}

renderCmdList('knowledge');
</script>
</body>
</html>
