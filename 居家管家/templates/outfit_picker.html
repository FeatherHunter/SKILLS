<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>居家管家 · 今天穿什么</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--fg:#1d1d1f;--fg2:#6e6e73;--fg3:#86868b;--bg:#f5f5f7;--card:#fff;--line:#d2d2d7;--blue:#007aff;--green:#34c759;--orange:#ff9500;--shadow:0 1px 2px rgba(0,0,0,.04),0 12px 36px rgba(0,0,0,.06)}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--fg);line-height:1.7;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:48px 22px 80px}
.hero{background:linear-gradient(180deg,#fff,#f8fbff);border-radius:24px;padding:28px;box-shadow:var(--shadow);margin-bottom:18px}
.eyebrow{color:var(--blue);font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
h1{font-size:30px;letter-spacing:-.03em;line-height:1.15;margin-bottom:8px}
.lead{color:var(--fg2);font-size:16px}
.cards{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.cards span{background:#fff;border:1px solid var(--line);border-radius:99px;padding:5px 10px;font-size:12px;color:var(--fg2)}
.cols{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.col{background:var(--card);border-radius:18px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.col h2{font-size:18px;margin-bottom:10px;color:var(--fg2);display:flex;justify-content:space-between;align-items:center}
.col h2 span{font-size:12px;color:var(--fg3);font-weight:normal}
.item{background:#fbfbfd;border-radius:14px;padding:10px;margin-bottom:8px;display:grid;grid-template-columns:60px 1fr auto;gap:10px;align-items:center;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.item:hover{background:#f5f8ff}
.item.picked{border-color:var(--blue);background:#eef5ff}
.photo{width:60px;height:60px;border-radius:10px;background:#eef1f5;overflow:hidden;display:flex;align-items:center;justify-content:center;color:var(--fg3);font-size:10px}
.photo img{width:100%;height:100%;object-fit:cover}
.name{font-weight:700;font-size:13px;line-height:1.3}
.tags{font-size:11px;color:var(--fg3);margin-top:2px}
.btn{border:none;border-radius:999px;padding:5px 11px;font-weight:700;cursor:pointer;font-size:11px;background:#f0f3f8;color:var(--fg2)}
.btn.active{background:var(--blue);color:#fff}
.fixed{position:sticky;bottom:16px;display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.copy{border:none;background:var(--blue);color:#fff;border-radius:999px;padding:11px 22px;font-weight:700;cursor:pointer;font-size:14px;box-shadow:var(--shadow)}
.summary{background:var(--card);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.04);text-align:center;color:var(--fg2)}
.summary b{color:var(--blue)}
.empty{background:var(--card);border-radius:18px;padding:40px;text-align:center;color:var(--fg3)}
.footer{color:var(--fg3);font-size:12px;text-align:center;margin-top:30px}
@media(max-width:760px){.wrap{padding:30px 14px 70px}.hero{padding:22px}h1{font-size:24px}.cols{grid-template-columns:1fr}.fixed{position:static}}
</style>
</head>
<body>
<div class="wrap">
<header class="hero">
<div class="eyebrow">Home Manager · 今天穿什么</div>
<h1 id="title">今天穿什么</h1>
<p class="lead" id="subtitle">居家管家穿搭选择</p>
<div class="cards" id="summary"></div>
</header>
<div class="summary" id="pickedSummary">请从每列各选一件（点击卡片切换选中状态）</div>
<div id="app"></div>
<div class="fixed"><button class="copy" id="copyBtn">复制今日穿搭回执</button></div>
<p class="footer">模板只展示注入数据，不直连数据库；复制回执发给 AI 执行 update --id X --location-status "穿着中"。</p>
</div>
<script id="payload" type="application/json"><!--INJECT-DATA--></script>
<script>
<!--SHARED-HELPERS-->
const app=document.getElementById('app');
const sumEl=document.getElementById('summary');
const titleEl=document.getElementById('title');
const subEl=document.getElementById('subtitle');
const pickedSummary=document.getElementById('pickedSummary');
const copyBtn=document.getElementById('copyBtn');

let DATA={groups:[],summary:{}};
let PICKED={};

function rebuildSummary(){
  const picks=Object.entries(PICKED).map(([key,it])=>{
    const grp=DATA.groups.find(g=>g.key===key);
    return grp?`<b>${esc(grp.label)}</b>: ${esc(it.name)}`:'';
  }).filter(Boolean);
  if(picks.length===0){
    pickedSummary.innerHTML='请从每列各选一件（点击卡片切换选中状态）';
  }else{
    pickedSummary.innerHTML='今日穿搭 · '+picks.join(' · ');
  }
}

function rebuildReceipt(){
  const lines=['outfit_pick_results:'];
  let count=0;
  for(const[key,it]of Object.entries(PICKED)){
    lines.push(`- ID ${it.id}（${esc(it.name)}）：状态 → 穿着中`);
    count++;
  }
  copyBtn.textContent=`复制今日穿搭回执（${count} 件）`;
  return lines.join('\n');
}

copyBtn.onclick=function(){
  const txt=rebuildReceipt();
  if(txt==='outfit_pick_results:'){alert('请先选择穿搭');return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>{
      const old=copyBtn.textContent;copyBtn.textContent='已复制 ✓';
      setTimeout(()=>{copyBtn.textContent=old;},1500);
    });
  }else{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();
  }
};

function render(){
let payload;
try{payload=JSON.parse(document.getElementById('payload').textContent)}catch(e){app.innerHTML='<div class="empty">数据解析失败：'+esc(e.message)+'</div>';return}
const v=validate(payload);
if(!v.ok){app.innerHTML='<div class="empty">数据校验失败：'+esc(v.msg)+'</div>';return}
const data=payload.data;
DATA={groups:arr(data.groups),summary:data.summary||{}};
PICKED={};
titleEl.textContent=DATA.summary.title||'今天穿什么';
subEl.textContent=DATA.summary.subtitle||'';
sumEl.innerHTML=arr(DATA.summary.metrics).map(m=>'<span>'+esc(m.label)+': '+esc(m.value)+'</span>').join('');
if(!DATA.groups.length){app.innerHTML='<div class="empty">没有可选衣物。</div>';return}
app.innerHTML='<div class="cols">'+DATA.groups.map(g=>{
  const items=arr(g.items);
  return `<div class="col" data-key="${esc(g.key)}">
<h2>${esc(g.label)}<span>${items.length} 件</span></h2>
${items.length?items.map(it=>{
  const tags=arr(it.tags).slice(0,3).map(t=>esc(t)).join(' · ');
  const photo=it.photo_base64?'<img alt="'+esc(it.name||'')+'" src="data:image/jpeg;base64,'+it.photo_base64+'">':'无图';
  return `<div class="item" data-key="${esc(g.key)}" data-id="${esc(it.id)}">
<div class="photo">${photo}</div>
<div><div class="name">ID ${esc(it.id)} · ${esc(it.name||'')}</div><div class="tags">${tags||'(无标签)'}</div></div>
<button class="btn pick-btn" data-key="${esc(g.key)}" data-id="${esc(it.id)}">选</button>
</div>`;
}).join(''):'<div class="empty">无</div>'}
</div>`;
}).join('')+'</div>';

app.querySelectorAll('.item').forEach(el=>{
  el.onclick=function(e){
    if(e.target.classList.contains('pick-btn'))return;
    const key=this.getAttribute('data-key');
    const id=this.getAttribute('data-id');
    togglePick(key,id);
  };
});
app.querySelectorAll('.pick-btn').forEach(b=>{
  b.onclick=function(e){
    e.stopPropagation();
    const key=this.getAttribute('data-key');
    const id=this.getAttribute('data-id');
    togglePick(key,id);
  };
});
rebuildSummary();
rebuildReceipt();
}

function togglePick(key,id){
  const grp=DATA.groups.find(g=>g.key===key);
  if(!grp) return;
  const it=arr(grp.items).find(x=>String(x.id)===String(id));
  if(!it) return;
  if(PICKED[key]&&String(PICKED[key].id)===String(id)){delete PICKED[key];}
  else{PICKED[key]=it;}
  const col=document.querySelector(`.col[data-key="${key}"]`);
  if(col){
    col.querySelectorAll('.item').forEach(el=>{
      const elId=el.getAttribute('data-id');
      el.classList.toggle('picked',PICKED[key]&&String(PICKED[key].id)===String(elId));
    });
  }
  rebuildSummary();
  rebuildReceipt();
}

render();
</script>
</body>
</html>
