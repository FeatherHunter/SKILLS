<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智剪工坊 v1.15 DEMO - Timeline + Video Preview</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a28;--surface:#222236;--surface2:#2e2e48;--surface3:#3a3a56;
  --text:#e8e8f4;--text2:#a0a0b8;--text3:#6a6a80;
  --accent:#7c6ff7;--accent2:#5b4fd4;--accent-glow:rgba(124,111,247,.3);
  --danger:#f74e6;--success:#2ecc71;--warn:#f39c12;
  --border:#3a3a56;--radius:6px;
  --track-h:60px;--track-gap:2px;--ruler-h:24px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);overflow:hidden;font-size:13px}
.app{display:flex;flex-direction:column;height:100vh}
/* Topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:7px 14px;background:var(--surface);border-bottom:1px solid var(--border);z-index:20;flex-shrink:0}
.logo{font-weight:700;font-size:14px;color:var(--accent);letter-spacing:.3px}
.logo span{color:var(--text2);font-weight:400}
.topbar input[type="text"]{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:3px 8px;font-size:11px;width:150px}
.topbar input:focus{outline:none;border-color:var(--accent)}
.topbar .spacer{flex:1}
.btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:4px 10px;font-size:11px;cursor:pointer;transition:.15s;white-space:nowrap}
.btn:hover{background:var(--surface3);border-color:var(--text3)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent2)}
.btn.danger{color:var(--danger);border-color:transparent;background:transparent}
.btn.danger:hover{background:rgba(247,78,100,.15)}
.seperator{width:1px;height:20px;background:var(--border);margin:0 2px}
/* Main layout */
.main-area{display:flex;flex:1;overflow:hidden}
/* Left panel */
.left-panel{width:200px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.panel-title{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;padding:8px 10px 3px;font-weight:600;flex-shrink:0}
.media-list{flex:1;overflow-y:auto;padding:0 6px 6px}
.media-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:var(--radius);cursor:pointer;transition:.15s;margin-bottom:2px}
.media-item:hover{background:var(--surface2)}
.media-item.active{background:var(--accent-glow);box-shadow:inset 2px 0 0 var(--accent)}
.media-thumb{width:32px;height:22px;background:linear-gradient(135deg,#4a4a6a,#33334d);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;overflow:hidden}
.media-thumb img{width:100%;height:100%;object-fit:cover}
.media-info{min-width:0;flex:1}
.media-name{font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.media-dur{font-size:9px;color:var(--text3)}
.media-type-badge{font-size:8px;padding:1px 3px;border-radius:3px;background:var(--surface3);color:var(--text3);flex-shrink:0}
.btn-add-media{width:calc(100% - 12px);margin:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:4px;font-size:11px}
.video-meta{padding:6px 10px;border-top:1px solid var(--border);overflow-y:auto;max-height:280px}
.vm-row{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.vm-label{font-size:10px;color:var(--text2);width:40px;flex-shrink:0}
.vm-input,.vm-select{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:2px 6px;font-size:10px;min-width:0}
.vm-input:focus,.vm-select:focus{outline:none;border-color:var(--accent)}
.vm-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:4px 6px;font-size:10px;resize:vertical;min-height:24px;font-family:inherit}
.section-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:4px 0 2px}
.badge-btn{display:inline-flex;align-items:center;gap:3px;font-size:9px;padding:1px 5px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);cursor:pointer;color:var(--text2);margin-right:3px}
.badge-btn.on{border-color:var(--accent);background:var(--accent-glow);color:var(--accent)}
/* Center - Timeline + Preview */
.center-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.timeline-toolbar{display:flex;align-items:center;gap:4px;padding:5px 8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.tool-group{display:flex;align-items:center;gap:1px;padding:0 4px;border-right:1px solid var(--border)}
.tool-group:last-child{border:none}
.tool-btn{width:28px;height:28px;border-radius:4px;border:1px solid transparent;background:transparent;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s;font-size:13px}
.tool-btn:hover{background:var(--surface2);color:var(--text)}
.tool-btn.active{background:var(--accent-glow);color:var(--accent);border-color:var(--accent)}
.zoom-control{display:flex;align-items:center;gap:3px}
.zoom-control input[type=range]{width:60px;accent-color:var(--accent)}
.zoom-label{font-size:9px;color:var(--text3);min-width:28px;text-align:center}
.playhead-indicator{font-size:10px;color:var(--text2);font-variant-numeric:tabular-nums;min-width:60px;text-align:center;font-family:monospace}
/* Canvas wrapper */
.canvas-wrap{flex:0 0 auto;position:relative;overflow:hidden;background:#151520;height:220px;border-bottom:1px solid var(--border)}
#timeline-canvas{width:100%;height:100%;display:block;cursor:default}
#timeline-canvas.grab{cursor:grabbing}
/* Preview panel */
.preview-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0d0d14}
.preview-header{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.preview-header .title{font-size:11px;color:var(--text2);font-weight:600}
.preview-header .time{font-size:10px;color:var(--accent);font-family:monospace}
.preview-header .spacer{flex:1}
.preview-stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:#0a0a10}
.preview-video{max-width:100%;max-height:100%;background:#000}
.preview-placeholder{color:var(--text3);text-align:center;font-size:12px}
.preview-placeholder .big{font-size:36px;margin-bottom:8px}
.preview-controls{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.preview-controls button{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer}
.preview-controls button:hover{background:var(--surface3)}
.preview-controls input[type=range]{flex:1;accent-color:var(--accent)}
.preview-controls .time-label{font-size:9px;color:var(--text3);font-family:monospace;min-width:80px;text-align:center}
/* Right panel */
.right-panel{width:230px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.props-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:11px;text-align:center;padding:16px}
.props-content{flex:1;overflow-y:auto;padding:8px}
.prop-group{margin-bottom:10px}
.prop-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;display:flex;align-items:center;justify-content:space-between}
.prop-label .op-color{width:8px;height:8px;border-radius:2px;display:inline-block}
.prop-row{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.prop-row label{font-size:10px;color:var(--text2);min-width:40px;flex-shrink:0}
.prop-row input[type="number"],.prop-row input[type="text"],.prop-row select{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:2px 6px;font-size:10px;min-width:0}
.prop-row input:focus,.prop-row select:focus{outline:none;border-color:var(--accent)}
.prop-time-inputs{display:flex;gap:3px;flex:1}
.prop-time-inputs input{flex:1;min-width:0}
.prop-note{font-size:10px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:4px 6px;width:100%;resize:vertical;min-height:24px;font-family:inherit;margin-top:4px}
.props-hint{font-size:9px;color:var(--text3);margin-top:3px}
/* Bottom panel */
.bottom-panel{background:var(--surface);border-top:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.field-inline{display:flex;align-items:center;gap:4px}
.field-inline label{font-size:10px;color:var(--text2);white-space:nowrap}
.field-inline select,.field-inline input[type=text]{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:2px 6px;font-size:10px}
.field-inline input[type=text]{width:80px}
.field-inline select{width:100px}
.intent-input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:2px 6px;font-size:10px;min-width:100px}
/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--surface3);color:var(--text);padding:6px 16px;border-radius:16px;font-size:11px;opacity:0;pointer-events:none;transition:.3s;z-index:1000}
.toast.show{opacity:1}
.toast.success{color:var(--success)}
.toast.error{color:var(--danger)}
/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}
/* Context menu */
.ctx-menu{position:fixed;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:3px 0;min-width:120px;z-index:999;box-shadow:0 6px 20px rgba(0,0,0,.4);display:none}
.ctx-menu.show{display:block}
.ctx-item{padding:5px 12px;font-size:11px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px}
.ctx-item:hover{background:var(--accent);color:#fff}
.ctx-item.danger:hover{background:var(--danger)}
.ctx-sep{height:1px;background:var(--border);margin:2px 0}
.ctx-item .key{margin-left:auto;color:var(--text3);font-size:9px}
.ctx-item:hover .key{color:rgba(255,255,255,.6)}
/* Loading overlay */
.loading-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:50;font-size:12px;color:var(--text2)}
.loading-overlay .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="logo">智剪工坊 <span>v1.15-DEMO · Timeline + Preview</span></div>
    <input type="text" id="project-title" placeholder="成片标题" value="健身减脂 Day 2">
    <div class="seperator"></div>
    <input type="text" id="project-name" placeholder="项目名" value="Day2_减脂日记">
    <div class="seperator"></div>
    <input type="text" id="project-target" placeholder="目标时长" value="2-3">
    <div class="spacer"></div>
    <button class="btn" id="btn-load-folder">📂 打开文件夹</button>
    <button class="btn" id="btn-load-demo">🎬 加载示例</button>
    <div class="seperator"></div>
    <button class="btn" id="btn-undo">↩ 撤销</button>
    <button class="btn" id="btn-redo">↪ 重做</button>
    <div class="seperator"></div>
    <button class="btn primary" id="btn-save">💾 生成 JSON</button>
  </div>

  <div class="main-area">
    <!-- Left Panel -->
    <div class="left-panel">
      <div class="panel-title" id="media-title">素材 (0)</div>
      <div class="media-list" id="media-list">
        <div style="color:var(--text3);font-size:10px;padding:16px 6px;text-align:center">
          点击 📂 打开文件夹<br>选择含视频的文件夹
        </div>
      </div>
      <button class="btn btn-add-media" id="btn-add-file">+ 添加文件</button>
      <div class="video-meta" id="video-meta-panel" style="display:none">
        <div class="section-label">视频信息</div>
        <div class="vm-row"><span class="vm-label">简介</span><textarea class="vm-textarea" id="vm-summary" placeholder="这段拍的是啥" rows="2"></textarea></div>
        <div class="vm-row"><span class="vm-label">意图</span><textarea class="vm-textarea" id="vm-intent" placeholder="为啥用这条" rows="2"></textarea></div>
        <div class="vm-row"><span class="vm-label">声音</span>
          <select class="vm-select" id="vm-voice">
            <option value="">—</option><option value="keep">保留</option>
            <option value="keep-with-filler-removed">保留+去水词</option>
            <option value="mute">静音</option><option value="bgm-only">只留 BGM</option>
          </select>
        </div>
        <div class="section-label">音频处理</div>
        <span class="badge-btn" id="vm-denoise" data-key="denoise">降噪</span>
        <span class="badge-btn" id="vm-normalize" data-key="normalize">响度归一</span>
        <span class="badge-btn" id="vm-silence" data-key="silence">去静音段</span>
        <div style="height:4px"></div>
        <div class="section-label">变声</div>
        <select class="vm-select" id="vm-voice-changer" style="width:100%">
          <option value="">不变声</option><option value="old_man">老人</option>
          <option value="child">小孩</option><option value="robot">机器人</option>
          <option value="female">女声</option><option value="male">男声</option>
        </select>
      </div>
    </div>

    <!-- Center: Timeline + Preview -->
    <div class="center-area">
      <div class="timeline-toolbar">
        <div class="tool-group" id="toolbar-ops">
          <button class="tool-btn active" data-op="select" title="选择 (V)">⬚</button>
          <button class="tool-btn" data-op="speed-up" title="加速">⚡</button>
          <button class="tool-btn" data-op="slow-down" title="减速">🐢</button>
          <button class="tool-btn" data-op="cut" title="删除片段">✂️</button>
          <button class="tool-btn" data-op="insert-image" title="插入图片">🖼</button>
          <button class="tool-btn" data-op="text" title="文字">🅣</button>
          <button class="tool-btn" data-op="color" title="调色">🎨</button>
        </div>
        <div class="tool-group">
          <span class="playhead-indicator" id="playhead-time">00:00.0</span>
        </div>
        <div class="tool-group">
          <div class="zoom-control">
            <span class="zoom-label">缩放</span>
            <input type="range" id="zoom-slider" min="20" max="400" value="60">
            <span class="zoom-label" id="zoom-pct">60%</span>
          </div>
        </div>
        <div class="tool-group">
          <button class="tool-btn active" id="btn-snap" title="吸附 (0.5s)">🧲</button>
        </div>
      </div>

      <!-- Timeline Canvas -->
      <div class="canvas-wrap" id="canvas-wrap">
        <canvas id="timeline-canvas"></canvas>
      </div>

      <!-- Video Preview -->
      <div class="preview-panel">
        <div class="preview-header">
          <span class="title">预览</span>
          <span class="time" id="preview-time">--:-- / --:--</span>
          <span class="spacer"></span>
          <span style="font-size:9px;color:var(--text3)" id="preview-info">选择片段或点击轨道预览</span>
        </div>
        <div class="preview-stage" id="preview-stage">
          <div class="preview-placeholder" id="preview-placeholder">
            <div class="big">🎬</div>
            <div>加载视频后点击轨道预览</div>
          </div>
          <video class="preview-video" id="preview-video" controls style="display:none"></video>
        </div>
        <div class="preview-controls">
          <button id="btn-preview-play">▶ 播放</button>
          <button id="btn-preview-pause">⏸ 暂停</button>
          <button id="btn-preview-stop">⏹ 停止</button>
          <input type="range" id="preview-seek" min="0" max="100" value="0">
          <span class="time-label" id="preview-time-label">00:00 / 00:00</span>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="panel-title">属性</div>
      <div id="props-content" class="props-content">
        <div class="props-empty">选中片段<br>查看/编辑属性</div>
      </div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-panel">
    <div class="field-inline"><label>比例</label><select id="output-aspect"><option value="9:16">9:16 竖屏</option><option value="16:9">16:9 横屏</option><option value="1:1">1:1 方形</option><option value="3:4">3:4</option><option value="4:3">4:3</option></select></div>
    <div class="field-inline"><label>封面</label><select id="cover-type"><option value="">待定</option><option value="ai-generate">AI 生成</option><option value="text-only">纯文字</option></select></div>
    <div class="field-inline"><label>结尾</label><select id="ending-type"><option value="">待定</option><option value="voice-narration">口播</option><option value="music-fade">音乐淡出</option><option value="cut-to-black">切黑</option></select></div>
    <div class="field-inline" style="flex:1"><label>整体想法</label><input type="text" class="intent-input" id="overall-intent" placeholder="今天想表达什么感觉？重点在哪？"></div>
    <button class="btn primary" id="btn-export">📋 导出 JSON</button>
  </div>
</div>

<div class="ctx-menu" id="ctx-menu">
  <div class="ctx-item" data-act="edit">✏️ 编辑属性</div>
  <div class="ctx-item" data-act="preview">👁 预览此片段</div>
  <div class="ctx-item" data-act="duplicate">📑 复制片段</div>
  <div class="ctx-item" data-act="split">✂️ 在播放头处分割</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" data-act="delete">🗑 删除 <span class="key">Del</span></div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ================================================================
   智剪工坊 v1.15 DEMO v2 — Canvas Timeline + Real Video Preview
   ================================================================ */
(function () {
  // ─── Constants ───────────────────────────────────────────────
  var OP_DEFS = {
    'select':       { label: '选择', color: 'transparent', hasRange: false },
    'speed-up':     { label: '加速', color: '#2ecc71' },
    'slow-down':    { label: '减速', color: '#3498db' },
    'cut':          { label: '删除片段', color: '#e74c3c' },
    'insert-image': { label: '插入图片', color: '#9b59b6', needFile: true },
    'text':         { label: '文字', color: '#f39c12', hasText: true },
    'color':        { label: '调色', color: '#e67e22', hasStyle: true }
  };
  var TRACK_HEIGHT = 60;
  var TRACK_GAP = 2;
  var RULER_HEIGHT = 24;
  var MIN_SEG = 0.3;
  var SNAP = 0.5;

  // ─── State ───────────────────────────────────────────────────
  var state = {
    videos: [],
    zoom: 60,
    scrollX: 0,
    playhead: 0,
    tool: 'select',
    snap: true,
    selectedVideoIdx: -1,
    selectedSegId: null,
    history: [],
    historyIdx: -1,
    dirHandle: null,
    videoElements: {},    // idx -> <video> element
    videoBlobUrls: {},    // idx -> blob URL
    thumbnails: {},       // idx -> [{time, dataUrl}]
    previewVideoIdx: -1,
    dirty: false
  };

  var canvas, ctx, canvasWrapEl;
  var trackRects = [];
  var segmentRects = [];
  var dragging = null;
  var ctxMenuTarget = null;
  var autoSaveTimer = null;

  // ─── DOM ─────────────────────────────────────────────────────
  var $ = function (id) { return document.getElementById(id); };
  var mediaListEl = $('media-list');
  var metaPanel = $('video-meta-panel');
  var propsContent = $('props-content');
  var ctxMenuEl = $('ctx-menu');
  var toastEl = $('toast');
  var canvasWrap = $('canvas-wrap');
  var previewVideo = $('preview-video');
  var previewPlaceholder = $('preview-placeholder');
  var previewSeek = $('preview-seek');
  var previewTimeLabel = $('preview-time-label');
  var previewTime = $('preview-time');
  var previewInfo = $('preview-info');

  function showToast(msg, type, dur) {
    type = type || ''; dur = dur || 2000;
    toastEl.textContent = msg;
    toastEl.className = 'toast show ' + type;
    clearTimeout(showToast._t);
    showToast._t = setTimeout(function () { toastEl.className = 'toast'; }, dur);
  }

  // ─── Time helpers ─────────────────────────────────────────────
  function fmtTime(s) {
    if (s == null || isNaN(s)) return '00:00.0';
    var m = Math.floor(s / 60);
    var sec = (s % 60).toFixed(1);
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(4, '0');
  }
  function parseTimeStr(str) {
    if (!str) return 0;
    str = String(str).trim();
    if (str.indexOf(':') >= 0) {
      var p = str.split(':');
      return parseFloat(p[0]) * 60 + parseFloat(p[1] || 0);
    }
    return parseFloat(str) || 0;
  }
  function uid() { return 'seg_' + Math.random().toString(36).slice(2, 9); }

  // ─── Canvas Setup ────────────────────────────────────────────
  function initCanvas() {
    canvas = $('timeline-canvas');
    ctx = canvas.getContext('2d');
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
  }
  function resizeCanvas() {
    var rect = canvasWrap.getBoundingClientRect();
    var dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    render();
  }
  function getCanvasSize() {
    var rect = canvasWrap.getBoundingClientRect();
    return { w: rect.width, h: rect.height };
  }
  function timeToX(t) { return (t - state.scrollX) * (state.zoom / 10); }
  function xToTime(x) { return x / (state.zoom / 10) + state.scrollX; }

  // ─── MAIN RENDER ─────────────────────────────────────────────
  function render() {
    if (!ctx) return;
    var size = getCanvasSize();
    var w = size.w, h = size.h;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#151520';
    ctx.fillRect(0, 0, w, h);

    trackRects = [];
    segmentRects = [];

    if (state.videos.length === 0) {
      ctx.fillStyle = '#3a3a56';
      ctx.font = '12px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('点击 📂 打开文件夹 加载视频', w / 2, h / 2);
      ctx.textAlign = 'left';
      return;
    }

    var totalTime = 30;
    state.videos.forEach(function (v) { if (v.duration > totalTime) totalTime = v.duration; });
    totalTime += 10;

    drawRuler(w, totalTime);

    var tracksTop = RULER_HEIGHT;
    state.videos.forEach(function (vid, idx) {
      var ty = tracksTop + idx * (TRACK_HEIGHT + TRACK_GAP);
      var tw = Math.max(w, timeToX(totalTime) + 50);

      // Track bg
      ctx.fillStyle = idx % 2 === 0 ? '#1e1e30' : '#1b1b2c';
      ctx.fillRect(0, ty, tw, TRACK_HEIGHT);
      ctx.strokeStyle = '#2e2e48';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, ty + TRACK_HEIGHT - 0.5);
      ctx.lineTo(tw, ty + TRACK_HEIGHT - 0.5);
      ctx.stroke();

      // Draw thumbnail strip for this video
      drawThumbnailStrip(idx, vid, ty, tw);

      // Track label
      var icon = vid.type === 'image' ? '\u{1F5BC}' : '\u{1F3AC}';
      ctx.fillStyle = 'rgba(255,255,255,.85)';
      ctx.font = 'bold 10px -apple-system, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(icon + ' #' + (idx + 1) + ' ' + vid.file, 6, ty + 12);

      // Duration + ops
      ctx.fillStyle = 'rgba(255,255,255,.45)';
      ctx.font = '9px monospace';
      var extra = (vid.segments && vid.segments.length) ? ('  ·  ' + vid.segments.length + ' ops') : '';
      ctx.fillText(fmtTime(vid.duration) + extra, 6, ty + 22);

      trackRects.push({ idx: idx, x: 0, y: ty, w: tw, h: TRACK_HEIGHT, vid: vid });

      // Draw segments
      (vid.segments || []).forEach(function (seg) {
        var sx = timeToX(seg.start);
        var sw = Math.max(3, (seg.end - seg.start) * (state.zoom / 10));
        var opDef = OP_DEFS[seg.op] || { color: '#888' };
        var isSelected = (state.selectedSegId === seg.id && state.selectedVideoIdx === idx);

        // Block
        var grad = ctx.createLinearGradient(sx, ty + 4, sx, ty + TRACK_HEIGHT - 4);
        grad.addColorStop(0, opDef.color + 'cc');
        grad.addColorStop(1, opDef.color + '88');
        ctx.fillStyle = grad;
        roundRect(sx, ty + 4, sw, TRACK_HEIGHT - 8, 4, true, false);

        // Selection
        if (isSelected) {
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          roundRect(sx + 1, ty + 5, sw - 2, TRACK_HEIGHT - 10, 3, false, true);
          ctx.fillStyle = '#fff';
          ctx.fillRect(sx - 3, ty + TRACK_HEIGHT / 2 - 6, 6, 12);
          ctx.fillRect(sx + sw - 3, ty + TRACK_HEIGHT / 2 - 6, 6, 12);
        }

        // Label
        if (sw > 30) {
          ctx.fillStyle = '#fff';
          ctx.font = 'bold 10px -apple-system, sans-serif';
          ctx.textAlign = 'left';
          var lbl = '';
          if (seg.op === 'speed-up') lbl = '\u{26A1} ' + (seg.factor || 2) + 'x';
          else if (seg.op === 'slow-down') lbl = '\u{1F422} ' + (seg.factor || 0.5) + 'x';
          else if (seg.op === 'cut') lbl = '\u{2702}';
          else if (seg.op === 'insert-image') lbl = '\u{1F5BC} ' + (seg.duration || 3) + 's';
          else if (seg.op === 'text') lbl = '\u{1F163} ' + (seg.text || '').slice(0, 6);
          else if (seg.op === 'color') lbl = '\u{1F3A8} ' + (seg.style || '').slice(0, 4);
          ctx.fillText(lbl, sx + 5, ty + TRACK_HEIGHT / 2 + 4);
        }

        segmentRects.push({ idx: idx, segId: seg.id, op: seg.op, x: sx, y: ty + 4, w: sw, h: TRACK_HEIGHT - 8, seg: seg });
      });
    });

    // Playhead
    if (state.playhead >= state.scrollX) {
      var px = timeToX(state.playhead);
      if (px >= 0 && px <= w) {
        ctx.strokeStyle = '#ff4466';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(px, 0);
        ctx.lineTo(px, h);
        ctx.stroke();
        ctx.fillStyle = '#ff4466';
        ctx.beginPath();
        ctx.moveTo(px - 5, 0);
        ctx.lineTo(px + 5, 0);
        ctx.lineTo(px, 6);
        ctx.closePath();
        ctx.fill();
      }
    }
  }

  function drawThumbnailStrip(idx, vid, ty, tw) {
    var thumbs = state.thumbnails[idx];
    if (!thumbs || !thumbs.length) return;
    var vw = timeToX(vid.duration) - timeToX(0);
    if (vw <= 0) return;
    thumbs.forEach(function (th) {
      var x = timeToX(th.time);
      if (x < -50 || x > tw) return;
      var img = th._img;
      if (img && img.complete && img.naturalWidth > 0) {
        var stripW = (tw / thumbs.length) * 0.95;
        try {
          ctx.globalAlpha = 0.35;
          ctx.drawImage(img, x, ty + 28, stripW, TRACK_HEIGHT - 32);
          ctx.globalAlpha = 1.0;
        } catch (e) {}
      }
    });
  }

  function roundRect(x, y, w, h, r, fill, stroke) {
    if (w < r * 2) r = w / 2;
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  function drawRuler(w, totalTime) {
    ctx.fillStyle = '#1e1e30';
    ctx.fillRect(0, 0, w, RULER_HEIGHT);
    ctx.strokeStyle = '#2e2e48';
    ctx.beginPath();
    ctx.moveTo(0, RULER_HEIGHT - 0.5);
    ctx.lineTo(w, RULER_HEIGHT - 0.5);
    ctx.stroke();

    var pxPerSec = state.zoom / 10;
    var interval = 1;
    if (pxPerSec < 10) interval = 30;
    else if (pxPerSec < 25) interval = 10;
    else if (pxPerSec < 50) interval = 5;
    else interval = 1;

    ctx.fillStyle = '#6a6a80';
    ctx.font = '8px monospace';
    ctx.textAlign = 'center';
    var startT = Math.floor(state.scrollX / interval) * interval;
    var endT = state.scrollX + w / pxPerSec;
    for (var t = startT; t <= endT; t += interval) {
      var px = timeToX(t);
      if (px < -20 || px > w + 20) continue;
      var isMajor = (t % (interval * 5) === 0) || interval >= 5;
      ctx.strokeStyle = isMajor ? '#6a6a80' : '#3a3a56';
      ctx.beginPath();
      ctx.moveTo(px, RULER_HEIGHT - (isMajor ? 10 : 5));
      ctx.lineTo(px, RULER_HEIGHT);
      ctx.stroke();
      if (isMajor && px > 15 && px < w - 15) {
        ctx.fillText(fmtTime(t), px, RULER_HEIGHT - 12);
      }
    }
    ctx.textAlign = 'left';
  }

  // ─── Hit Testing ─────────────────────────────────────────────
  function hitTest(px, py) {
    for (var i = 0; i < segmentRects.length; i++) {
      var sr = segmentRects[i];
      if (px >= sr.x && px <= sr.x + sr.w && py >= sr.y && py <= sr.y + sr.h) {
        var edge = null;
        if (px < sr.x + 6) edge = 'left';
        else if (px > sr.x + sr.w - 6) edge = 'right';
        return { type: 'segment', segId: sr.segId, idx: sr.idx, edge: edge, op: sr.op, seg: sr.seg };
      }
    }
    for (var j = 0; j < trackRects.length; j++) {
      var tr = trackRects[j];
      if (py >= tr.y && py <= tr.y + tr.h) {
        return { type: 'track', idx: tr.idx, time: xToTime(px) };
      }
    }
    return null;
  }

  // ─── Segment CRUD ────────────────────────────────────────────
  function addSegment(idx, op, start, end, extra) {
    extra = extra || {};
    var seg = { id: uid(), op: op, start: start, end: end };
    for (var k in extra) { if (extra.hasOwnProperty(k)) seg[k] = extra[k]; }
    if (!state.videos[idx].segments) state.videos[idx].segments = [];
    state.videos[idx].segments.push(seg);
    seg.start = Math.max(0, seg.start);
    if (seg.end - seg.start < MIN_SEG) seg.end = seg.start + MIN_SEG;
    pushHistory();
    state.selectedSegId = seg.id;
    state.selectedVideoIdx = idx;
    markDirty();
    render();
    updatePropsPanel();
    return seg;
  }
  function deleteSegment(idx, segId) {
    var v = state.videos[idx];
    if (!v) return;
    v.segments = (v.segments || []).filter(function (s) { return s.id !== segId; });
    if (state.selectedSegId === segId) state.selectedSegId = null;
    pushHistory(); markDirty(); render(); updatePropsPanel();
  }
  function getSegment(idx, segId) {
    var v = state.videos[idx];
    if (!v || !v.segments) return null;
    for (var i = 0; i < v.segments.length; i++) {
      if (v.segments[i].id === segId) return v.segments[i];
    }
    return null;
  }

  // ─── History ──────────────────────────────────────────────────
  function pushHistory() {
    state.history = state.history.slice(0, state.historyIdx + 1);
    state.history.push(JSON.stringify(state.videos));
    if (state.history.length > 50) state.history.shift();
    state.historyIdx = state.history.length - 1;
  }
  function undo() {
    if (state.historyIdx <= 0) return;
    state.historyIdx--;
    state.videos = JSON.parse(state.history[state.historyIdx]);
    state.selectedSegId = null;
    refreshAll();
    showToast('↩ 已撤销');
  }
  function redo() {
    if (state.historyIdx >= state.history.length - 1) return;
    state.historyIdx++;
    state.videos = JSON.parse(state.history[state.historyIdx]);
    refreshAll();
    showToast('↪ 已重做');
  }

  // ─── Mouse ───────────────────────────────────────────────────
  function setupMouse() {
    canvas.addEventListener('contextmenu', function (e) {
      e.preventDefault();
      var pos = canvasPosition(e);
      var hit = hitTest(pos.x, pos.y);
      if (hit && hit.type === 'segment') {
        ctxMenuTarget = { idx: hit.idx, segId: hit.segId };
        showContextMenu(e.clientX, e.clientY);
      }
    });

    canvas.addEventListener('mousedown', function (e) {
      var pos = canvasPosition(e);
      if (e.button !== 0) return;
      var hit = hitTest(pos.x, pos.y);

      if (state.tool === 'select') {
        if (hit && hit.type === 'segment') {
          state.selectedVideoIdx = hit.idx;
          state.selectedSegId = hit.segId;
          updatePropsPanel(); updateMetaPanel();
          var seg = getSegment(hit.idx, hit.segId);
          if (seg) {
            dragging = {
              type: hit.edge ? 'resize' : 'move',
              idx: hit.idx, segId: hit.segId, edge: hit.edge,
              startMouseX: e.clientX,
              startSegStart: seg.start, startSegEnd: seg.end
            };
            canvas.classList.add('grab');
          }
          // Also preview this segment
          previewSegment(hit.idx, hit.segId);
        } else if (hit && hit.type === 'track') {
          state.playhead = Math.max(0, hit.time);
          render(); updatePlayheadLabel();
          // Preview this video at this time
          previewVideoAt(hit.idx, hit.time);
        } else {
          state.selectedSegId = null; state.selectedVideoIdx = -1;
          updatePropsPanel(); updateMetaPanel(); render();
        }
      } else {
        if (hit && hit.type === 'track') {
          var t = hit.time;
          var snapT = state.snap ? Math.round(t / SNAP) * SNAP : t;
          snapT = Math.max(0, snapT);
          var defDur = state.tool === 'insert-image' ? 3 : 2;
          var newSeg = addSegment(hit.idx, state.tool, snapT, snapT + defDur);
          dragging = {
            type: 'resize', edge: 'right',
            idx: hit.idx, segId: newSeg.id,
            startMouseX: e.clientX,
            startSegStart: newSeg.start, startSegEnd: newSeg.end
          };
          canvas.classList.add('grab');
        } else if (hit && hit.type === 'segment') {
          state.selectedVideoIdx = hit.idx; state.selectedSegId = hit.segId;
          updatePropsPanel(); render();
          previewSegment(hit.idx, hit.segId);
        }
      }
    });

    window.addEventListener('mousemove', function (e) {
      if (!dragging) return;
      var dx = e.clientX - dragging.startMouseX;
      var dt = dx / (state.zoom / 10);
      var seg = getSegment(dragging.idx, dragging.segId);
      if (!seg) return;
      var maxEnd = state.videos[dragging.idx].duration;
      if (dragging.type === 'move') {
        var ns = dragging.startSegStart + dt;
        if (state.snap) ns = Math.round(ns / SNAP) * SNAP;
        ns = Math.max(0, ns);
        var dur = dragging.startSegEnd - dragging.startSegStart;
        seg.start = ns; seg.end = ns + dur;
        if (seg.end > maxEnd) { seg.end = maxEnd; seg.start = Math.max(0, maxEnd - dur); }
      } else if (dragging.type === 'resize') {
        if (dragging.edge === 'left') {
          var ns2 = dragging.startSegStart + dt;
          if (state.snap) ns2 = Math.round(ns2 / SNAP) * SNAP;
          seg.start = Math.max(0, Math.min(ns2, seg.end - MIN_SEG));
        } else {
          var ne = dragging.startSegEnd + dt;
          if (state.snap) ne = Math.round(ne / SNAP) * SNAP;
          seg.end = Math.max(seg.start + MIN_SEG, Math.min(ne, maxEnd));
        }
      }
      render(); updatePropsPanel();
    });

    window.addEventListener('mouseup', function () {
      if (dragging) { dragging = null; canvas.classList.remove('grab'); pushHistory(); markDirty(); render(); }
    });

    canvas.addEventListener('wheel', function (e) {
      e.preventDefault();
      var delta = e.deltaY > 0 ? -15 : 15;
      state.zoom = Math.max(20, Math.min(400, state.zoom + delta));
      $('zoom-slider').value = state.zoom;
      $('zoom-pct').textContent = state.zoom + '%';
      render();
    }, { passive: false });
  }

  function canvasPosition(e) {
    var rect = canvas.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  // ─── Keyboard ────────────────────────────────────────────────
  function setupKeyboard() {
    window.addEventListener('keydown', function (e) {
      var tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedSegId != null && state.selectedVideoIdx >= 0) {
        deleteSegment(state.selectedVideoIdx, state.selectedSegId);
      } else if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
        e.preventDefault(); undo();
      } else if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || e.key === 'Z')) {
        e.preventDefault(); redo();
      } else if (e.key === 'v') { setTool('select');
      } else if (e.key === 'Escape') { hideCtxMenu(); state.selectedSegId = null; render(); updatePropsPanel();
      } else if (e.key === ' ' && state.previewVideoIdx >= 0) {
        e.preventDefault();
        if (previewVideo.paused) previewVideo.play(); else previewVideo.pause();
      }
    });
    window.addEventListener('click', function (e) {
      if (!ctxMenuEl.contains(e.target)) hideCtxMenu();
    });
  }

  // ─── Toolbar ─────────────────────────────────────────────────
  function setupToolbar() {
    document.querySelectorAll('.tool-btn[data-op]').forEach(function (btn) {
      btn.addEventListener('click', function () { setTool(btn.dataset.op); });
    });
    $('btn-snap').addEventListener('click', function () {
      state.snap = !state.snap;
      $('btn-snap').classList.toggle('active', state.snap);
    });
    $('zoom-slider').addEventListener('input', function (e) {
      state.zoom = +e.target.value;
      $('zoom-pct').textContent = state.zoom + '%';
      render();
    });
    $('btn-undo').addEventListener('click', undo);
    $('btn-redo').addEventListener('click', redo);
  }
  function setTool(op) {
    state.tool = op;
    document.querySelectorAll('.tool-btn[data-op]').forEach(function (b) {
      b.classList.toggle('active', b.dataset.op === op);
    });
    canvas.style.cursor = op === 'select' ? 'default' : 'crosshair';
  }
  function updatePlayheadLabel() {
    $('playhead-time').textContent = fmtTime(state.playhead);
  }

  // ─── VIDEO PREVIEW ───────────────────────────────────────────
  function setupPreview() {
    $('btn-preview-play').addEventListener('click', function () {
      if (state.previewVideoIdx < 0) { showToast('请先选择片段或点击轨道', 'error'); return; }
      previewVideo.play();
    });
    $('btn-preview-pause').addEventListener('click', function () { previewVideo.pause(); });
    $('btn-preview-stop').addEventListener('click', function () {
      previewVideo.pause();
      if (state.previewVideoIdx >= 0) {
        var seg = getSegment(state.previewVideoIdx, state.selectedSegId);
        var t0 = seg ? seg.start : 0;
        previewVideo.currentTime = t0;
        syncPreviewSeek();
      }
    });
    previewVideo.addEventListener('timeupdate', function () {
      syncPreviewSeek();
    });
    previewVideo.addEventListener('loadedmetadata', function () {
      previewSeek.max = previewVideo.duration || 0;
      updatePreviewTimeLabel();
    });
    previewVideo.addEventListener('play', function () { $('btn-preview-play').style.color = 'var(--accent)'; });
    previewVideo.addEventListener('pause', function () { $('btn-preview-play').style.color = ''; });
    previewSeek.addEventListener('input', function () {
      if (state.previewVideoIdx >= 0 && isFinite(previewVideo.duration)) {
        previewVideo.currentTime = parseFloat(previewSeek.value);
      }
    });
  }

  function syncPreviewSeek() {
    if (state.previewVideoIdx < 0) return;
    var vid = state.videos[state.previewVideoIdx];
    if (!vid) return;
    var t = previewVideo.currentTime;
    previewSeek.value = t;
    updatePreviewTimeLabel();
    // Sync playhead on timeline
    state.playhead = t;
    render();
    updatePlayheadLabel();
  }

  function updatePreviewTimeLabel() {
    previewTimeLabel.textContent = fmtTime(previewVideo.currentTime) + ' / ' + fmtTime(previewVideo.duration || 0);
    previewTime.textContent = fmtTime(previewVideo.currentTime) + ' / ' + fmtTime(previewVideo.duration || 0);
  }

  function previewVideoAt(idx, time) {
    var vid = state.videos[idx];
    if (!vid) return;
    var vidEl = state.videoElements[idx];
    if (!vidEl) { showToast('视频尚未加载', 'error'); return; }
    state.previewVideoIdx = idx;
    state.selectedVideoIdx = idx;
    previewVideo.src = vidEl.src;
    previewVideo.style.display = 'block';
    previewPlaceholder.style.display = 'none';
    previewInfo.textContent = '预览: ' + vid.file;
    previewVideo.onloadedmetadata = function () {
      previewVideo.currentTime = Math.max(0, Math.min(time, previewVideo.duration || 0));
      previewSeek.max = previewVideo.duration || 0;
      updatePreviewTimeLabel();
    };
    render();
  }

  function previewSegment(idx, segId) {
    var seg = getSegment(idx, segId);
    if (!seg) return;
    previewVideoAt(idx, seg.start);
  }

  // ─── VIDEO LOADING + THUMBNAILS ──────────────────────────────
  async function loadVideoFile(idx, file) {
    return new Promise(function (resolve) {
      var url = URL.createObjectURL(file);
      state.videoBlobUrls[idx] = url;
      var vidEl = document.createElement('video');
      vidEl.preload = 'metadata';
      vidEl.muted = true;
      vidEl.src = url;
      vidEl.addEventListener('loadedmetadata', function () {
        state.videos[idx].duration = vidEl.duration;
        state.videoElements[idx] = vidEl;
        showToast('已加载: ' + file.name + ' (' + fmtTime(vidEl.duration) + ')', 'success');
        // Extract thumbnails
        extractThumbnails(idx, vidEl);
        resolve();
      });
      vidEl.addEventListener('error', function () {
        showToast('无法解码: ' + file.name, 'error');
        state.videos[idx].duration = 30;
        resolve();
      });
    });
  }

  function extractThumbnails(idx, vidEl) {
    var duration = vidEl.duration;
    if (!duration || !isFinite(duration)) return;
    var count = Math.min(20, Math.max(5, Math.floor(duration / 2)));
    var interval = duration / count;
    var thumbs = [];
    var loaded = 0;

    function grab(i) {
      if (i >= count) {
        state.thumbnails[idx] = thumbs;
        render();
        return;
      }
      var t = i * interval;
      vidEl.currentTime = t;
      vidEl.addEventListener('seeked', function onSeeked() {
        vidEl.removeEventListener('seeked', onSeeked);
        var c = document.createElement('canvas');
        c.width = 80; c.height = 45;
        var cx = c.getContext('2d');
        try { cx.drawImage(vidEl, 0, 0, 80, 45); } catch(e) {}
        var dataUrl = '';
        try { dataUrl = c.toDataURL('image/jpeg', 0.5); } catch(e) {}
        var img = new Image();
        img.src = dataUrl;
        thumbs.push({ time: t, dataUrl: dataUrl, _img: img });
        loaded++;
        if (loaded % 5 === 0) render();
        grab(i + 1);
      });
    }
    grab(0);
  }

  // ─── Folder Picker ───────────────────────────────────────────
  function pickFolder() {
    if (!('showDirectoryPicker' in window)) {
      showToast('浏览器不支持文件夹选择，用"加载示例"代替', 'error');
      return;
    }
    window.showDirectoryPicker().then(function (handle) {
      state.dirHandle = handle;
      showToast('✅ 已选择: ' + handle.name, 'success');
      scanFolder(handle);
    }).catch(function (e) {
      if (e.name !== 'AbortError') showToast('打开失败: ' + e.message, 'error');
    });
  }

  async function scanFolder(dirHandle) {
    var files = [];
    try {
      for await (var entry of dirHandle.values()) {
        if (entry.kind === 'file' && /\.(mp4|mov|mkv|avi|webm)$/i.test(entry.name)) {
          files.push(entry);
        }
      }
    } catch (e) {
      for await (var item of dirHandle.entries()) {
        if (item[1].kind === 'file' && /\.(mp4|mov|mkv|avi|webm)$/i.test(item[0])) {
          files.push(item[1]);
        }
      }
    }
    files.sort(function (a, b) { return a.name.localeCompare(b.name); });
    if (!files.length) { showToast('文件夹里没发现视频', 'error'); return; }

    // Build video entries
    state.videos = files.map(function (f, i) {
      return {
        id: uid(), file: f.name, duration: 0, type: 'video',
        summary: '', intent: '', voice: '', voiceNote: '', voiceChanger: '',
        denoise: false, normalize: false, silence: false,
        segments: [], thumbDataUrl: '', _fileEntry: f
      };
    });
    state.history = [JSON.stringify(state.videos)];
    state.historyIdx = 0;
    refreshAll();
    showToast('发现 ' + files.length + ' 个视频，正在解码...', 'success');

    // Load each video
    for (var i = 0; i < files.length; i++) {
      var file = await files[i].getFile();
      await loadVideoFile(i, file);
      refreshAll();
    }
  }

  function createSyntheticVideo() {
    return new Promise(function (resolve, reject) {
      var canvas = document.createElement('canvas');
      canvas.width = 640; canvas.height = 360;
      var cx = canvas.getContext('2d');
      var chunks = [];
      var mediaRecorder;

      try {
        var stream = canvas.captureStream(30);
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
      } catch (e) { reject(e); return; }

      mediaRecorder.ondataavailable = function (e) { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = function () {
        var blob = new Blob(chunks, { type: 'video/webm' });
        resolve(blob);
      };

      mediaRecorder.start();

      var duration = 60; // seconds
      var frame = 0;
      var totalFrames = duration * 30;

      function drawFrame() {
        var t = frame / 30;
        // Background gradient that changes over time
        var hue = (t * 30) % 360;
        cx.fillStyle = 'hsl(' + hue + ', 60%, 20%)';
        cx.fillRect(0, 0, 640, 360);

        // Moving shapes
        for (var i = 0; i < 5; i++) {
          var x = ((t * 50 + i * 130) % 700) - 30;
          var y = 100 + i * 40 + Math.sin(t * 2 + i) * 30;
          cx.fillStyle = 'hsl(' + ((hue + i * 60) % 360) + ', 70%, 55%)';
          cx.beginPath();
          cx.arc(x, y, 25, 0, Math.PI * 2);
          cx.fill();
        }

        // Timecode
        cx.fillStyle = '#fff';
        cx.font = 'bold 28px monospace';
        cx.fillText(fmtTime(t), 20, 50);

        // Progress bar
        cx.fillStyle = 'rgba(255,255,255,.3)';
        cx.fillRect(20, 320, 600, 8);
        cx.fillStyle = '#7c6ff7';
        cx.fillRect(20, 320, 600 * (t / duration), 8);

        // Segment markers visualization
        if (t < 15) { cx.fillStyle = 'rgba(46,204,113,.5)'; cx.fillRect(0, 340, 640, 20); cx.fillStyle = '#fff'; cx.font = '12px sans-serif'; cx.fillText('SPEED UP 2x', 20, 355); }
        else if (t < 35) { cx.fillStyle = 'rgba(52,152,219,.5)'; cx.fillRect(0, 340, 640, 20); cx.fillStyle = '#fff'; cx.font = '12px sans-serif'; cx.fillText('SLOW DOWN 0.5x', 20, 355); }
        else if (t < 50) { cx.fillStyle = 'rgba(231,76,60,.5)'; cx.fillRect(0, 340, 640, 20); cx.fillStyle = '#fff'; cx.font = '12px sans-serif'; cx.fillText('CUT', 20, 355); }
        else { cx.fillStyle = 'rgba(230,126,34,.5)'; cx.fillRect(0, 340, 640, 20); cx.fillStyle = '#fff'; cx.font = '12px sans-serif'; cx.fillText('COLOR GRADE', 20, 355); }

        frame++;
        if (frame < totalFrames) {
          requestAnimationFrame(drawFrame);
        } else {
          mediaRecorder.stop();
        }
      }
      requestAnimationFrame(drawFrame);
    });
  }

    });
    if ($('prop-text')) $('prop-text').addEventListener('input', function (e) {

  }

  // ─── Context Menu ────────────────────────────────────────────
  function setupCtxMenu() {
    ctxMenuEl.querySelectorAll('.ctx-item').forEach(function (item) {
      item.addEventListener('click', function () {
        var act = item.dataset.act;
        hideCtxMenu();
        if (!ctxMenuTarget) return;
        var idx = ctxMenuTarget.idx, segId = ctxMenuTarget.segId;
        var seg = getSegment(idx, segId);
        if (!seg) return;
        if (act === 'edit') {
          state.selectedVideoIdx = idx; state.selectedSegId = segId;
          updatePropsPanel(); render();
        } else if (act === 'preview') {
          previewSegment(idx, segId);
        } else if (act === 'delete') {
          deleteSegment(idx, segId);
        } else if (act === 'duplicate') {
          var newSeg = JSON.parse(JSON.stringify(seg));
          newSeg.id = uid(); newSeg.start = seg.end; newSeg.end = seg.end + (seg.end - seg.start);
          state.videos[idx].segments.push(newSeg);
          state.selectedSegId = newSeg.id;
          pushHistory(); render(); updatePropsPanel(); markDirty();
        } else if (act === 'split') {
          if (state.playhead > seg.start && state.playhead < seg.end) {
            var segEnd = seg.end; seg.end = state.playhead;
            var newSeg2 = JSON.parse(JSON.stringify(seg));
            newSeg2.id = uid(); newSeg2.start = state.playhead; newSeg2.end = segEnd;
            state.videos[idx].segments.push(newSeg2);
            pushHistory(); render(); markDirty();
          } else { showToast('播放头不在片段内', 'error'); }
        }
        ctxMenuTarget = null;
      });
    });
  }
  function showContextMenu(x, y) { ctxMenuEl.classList.add('show'); ctxMenuEl.style.left = x + 'px'; ctxMenuEl.style.top = y + 'px'; }
  function hideCtxMenu() { ctxMenuEl.classList.remove('show'); }

  // ─── LocalStorage Autosave ───────────────────────────────────
  function markDirty() { state.dirty = true; scheduleAutoSave(); }
  function scheduleAutoSave() { clearTimeout(autoSaveTimer); autoSaveTimer = setTimeout(autoSave, 3000); }
  function autoSave() {
    try {
      localStorage.setItem('zhijian_demo_v2_autosave', JSON.stringify({
        videos: state.videos.map(function (v) {
          var c = Object.assign({}, v);
          delete c._fileEntry; delete c.thumbDataUrl;
          return c;
        }),
        project: {
          title: $('project-title').value, name: $('project-name').value,
          target: $('project-target').value, aspect: $('output-aspect').value,
          cover: $('cover-type').value, ending: $('ending-type').value,
          intent: $('overall-intent').value
        },
        ts: Date.now()
      }));
    } catch (e) { /* quota or blob URL */ }
  }
  function setupAutoSave() {
    ['project-title', 'project-name', 'project-target', 'output-aspect', 'cover-type', 'ending-type', 'overall-intent'].forEach(function (id) {
      $(id).addEventListener('input', scheduleAutoSave);
    });
  }
  function tryRestore() {
    try {
      var raw = localStorage.getItem('zhijian_demo_v2_autosave');
      if (!raw) return false;
      var data = JSON.parse(raw);
      if (data.videos) state.videos = data.videos;
      if (data.project) {
        if (data.project.title) $('project-title').value = data.project.title;
        if (data.project.name) $('project-name').value = data.project.name;
        if (data.project.target) $('project-target').value = data.project.target;
        if (data.project.aspect) $('output-aspect').value = data.project.aspect;
        if (data.project.cover) $('cover-type').value = data.project.cover;
        if (data.project.ending) $('ending-type').value = data.project.ending;
        if (data.project.intent) $('overall-intent').value = data.project.intent;
      }
      state.history = [JSON.stringify(state.videos)];
      state.historyIdx = 0;
      refreshAll();
      var d = new Date(data.ts);
      showToast('✅ 已恢复 ' + d.toLocaleTimeString(), 'success', 2500);
      return true;
    } catch (e) { return false; }
  }

  // ─── Export ──────────────────────────────────────────────────
  function buildOutput() {
    var now = new Date();
    var pad = function (n) { return String(n).padStart(2, '0'); };
    var ts = now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) + '_' + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());

    var videos = state.videos.map(function (v, idx) {
      var out = { index: idx + 1, file: v.file, type: v.type };
      if (v.summary) out.summary = v.summary;
      if (v.intent) out.intent = v.intent;
      if (v.voice) out.voice = v.voice;
      if (v.voiceChanger) out.voiceChanger = v.voiceChanger;
      if (v.denoise || v.normalize || v.silence) {
        out.audio = {};
        if (v.denoise) out.audio.denoise = true;
        if (v.normalize) out.audio.normalize = true;
        if (v.silence) out.audio.removeSilence = true;
      }
      if (v.segments && v.segments.length) {
        out.ops = {};
        v.segments.forEach(function (seg) {
          if (!out.ops[seg.op]) out.ops[seg.op] = { ranges: [] };
          var r = { from: +seg.start.toFixed(2), to: +seg.end.toFixed(2) };
          if (seg.op === 'speed-up' || seg.op === 'slow-down') r.factor = seg.factor;
          if (seg.op === 'insert-image') { r.duration = seg.duration; if (seg.file) r.file = seg.file; }
          if (seg.op === 'text') { r.text = seg.text; r.duration = seg.duration; }
          if (seg.op === 'color') r.style = seg.style;
          if (seg.note) r.note = seg.note;
          out.ops[seg.op].ranges.push(r);
        });
      }
      return out;
    });

    return {
      _meta: { tool: '智剪工坊-timeline-v2', version: '1.15-DEMO', generated: now.toISOString(), timestamp: ts, workspace: state.dirHandle ? state.dirHandle.name : '(unknown)' },
      project: { name: $('project-name').value || 'untitled', title: $('project-title').value || '', target_length: $('project-target').value || '', overall_intent: $('overall-intent').value || '' },
      output: { aspect_ratio: $('output-aspect').value || '9:16' },
      cover: { type: $('cover-type').value || '', prompt: '' },
      ending: { type: $('ending-type').value || '', script: '' },
      videos: videos,
      _summary: {
        totalVideos: state.videos.filter(function (v) { return v.type === 'video'; }).length,
        totalImages: state.videos.filter(function (v) { return v.type === 'image'; }).length,
        totalDuration: state.videos.reduce(function (s, v) { return s + (v.duration || 0); }, 0),
        opsUsed: Array.from(new Set(state.videos.flatMap(function (v) { return (v.segments || []).map(function (s) { return s.op; }); })))
      }
    };
  }
  function exportJSON() {
    if (state.videos.length === 0) { showToast('请先添加素材', 'error'); return; }
    var data = buildOutput();
    var json = JSON.stringify(data, null, 2);
    var blob = new Blob([json], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'intent_' + data._meta.timestamp + '_timeline.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ 已下载 ' + a.download, 'success');
  }

        }
        state.history = [JSON.stringify(state.videos)];
        state.historyIdx = 0;
        refreshAll();
        showToast('✅ 已添加 ' + count + ' 个文件', 'success');
      };
      inp.click();
    });
  }

  // ─── Init ────────────────────────────────────────────────────
  function init() {
    initCanvas();
    setupMouse();
    setupKeyboard();
    setupToolbar();
    setupMetaPanel();
    setupCtxMenu();
    setupPreview();
    setupAutoSave();
    bindButtons();
    var restored = tryRestore();
    if (!restored) {
      // Auto-load demo on first visit
      setTimeout(loadDemoData, 500);
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
