<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百科采集</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#007AFF;
  --blue-light:#E8F2FF;
  --black:#1d1d1f;
  --gray:#86868b;
  --gray-light:#f5f5f7;
  --border:#e5e5ea;
  --bg:#ffffff;
  --radius:10px;
}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",Arial,sans-serif;
  color:var(--black);
  background:var(--bg);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
/* Header */
.header{
  padding:48px 24px 32px;
  max-width:800px;
  margin:0 auto;
}
.header h1{
  font-size:34px;
  font-weight:700;
  letter-spacing:-.5px;
  margin-bottom:8px;
}
.header p{
  font-size:17px;
  color:var(--gray);
  line-height:1.5;
}
/* Search */
.search-wrap{
  max-width:800px;
  margin:0 auto;
  padding:0 24px 20px;
}
.search-input{
  width:100%;
  padding:12px 16px;
  font-size:17px;
  border:1px solid var(--border);
  border-radius:var(--radius);
  outline:none;
  background:var(--gray-light);
  transition:border-color .2s;
  font-family:inherit;
}
.search-input:focus{border-color:var(--blue);background:#fff}
.search-input::placeholder{color:#c7c7cc}
/* Tabs */
.tabs{
  max-width:800px;
  margin:0 auto;
  padding:0 24px;
  display:flex;
  gap:8px;
  border-bottom:1px solid var(--border);
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  padding:10px 18px;
  font-size:15px;
  font-weight:500;
  color:var(--gray);
  border:none;
  background:none;
  cursor:pointer;
  white-space:nowrap;
  border-bottom:2px solid transparent;
  transition:color .2s,border-color .2s;
  font-family:inherit;
}
.tab:hover{color:var(--black)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
/* Container */
.container{
  max-width:800px;
  margin:0 auto;
  padding:24px;
}
/* Count */
.count{
  font-size:13px;
  color:var(--gray);
  margin-bottom:16px;
}
/* Card */
.card{
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:12px;
  overflow:hidden;
  transition:border-color .2s;
}
.card:hover{border-color:#c7c7cc}
.card-head{
  padding:16px 20px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:space-between;
  -webkit-tap-highlight-color:transparent;
}
.card-title{
  font-size:17px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:10px;
}
.card-badge{
  font-size:12px;
  font-weight:500;
  color:var(--blue);
  background:var(--blue-light);
  padding:2px 8px;
  border-radius:6px;
}
.card-desc{
  font-size:14px;
  color:var(--gray);
  margin-top:2px;
}
.card-right{
  display:flex;
  align-items:center;
  gap:8px;
}
.card-arrow{
  font-size:12px;
  color:#c7c7cc;
  transition:transform .25s;
}
.card.open .card-arrow{transform:rotate(90deg)}
/* Wake words */
.card-body{
  max-height:0;
  overflow:hidden;
  transition:max-height .3s ease;
}
.card.open .card-body{max-height:2000px}
.card-inner{
  padding:0 20px 20px;
  border-top:1px solid var(--border);
}
.section-label{
  font-size:13px;
  font-weight:600;
  color:var(--gray);
  text-transform:uppercase;
  letter-spacing:.5px;
  margin:16px 0 10px;
}
/* Word chips */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.chip{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 14px;
  font-size:15px;
  font-weight:500;
  color:var(--blue);
  background:var(--blue-light);
  border:1px solid transparent;
  border-radius:8px;
  cursor:pointer;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  font-family:inherit;
}
.chip:hover{background:#d6e8ff}
.chip:active{background:#bddcff}
.chip.selected{background:var(--blue);color:#fff}
.chip .chip-cmd{
  font-size:12px;
  color:var(--gray);
  display:none;
}
.chip.selected .chip-cmd{color:rgba(255,255,255,.8)}
/* Detail panel */
.detail{
  background:var(--gray-light);
  border-radius:8px;
  padding:16px;
  margin-top:12px;
  display:none;
  font-size:14px;
  line-height:1.7;
}
.detail.show{display:block}
.detail-title{
  font-size:13px;
  font-weight:600;
  color:var(--gray);
  margin-bottom:8px;
}
.detail p{margin-bottom:8px}
.detail p:last-child{margin-bottom:0}
/* CLI tag */
.cli-tag{
  display:inline-block;
  font-family:"SF Mono","Fira Code",Menlo,Consolas,monospace;
  font-size:13px;
  color:var(--blue);
  background:var(--blue-light);
  padding:3px 10px;
  border-radius:6px;
  cursor:pointer;
  margin:4px 4px 4px 0;
  transition:background .15s;
  border:1px solid transparent;
  word-break:break-all;
}
.cli-tag:hover{background:#d6e8ff;border-color:#b8d4ff}
.cli-tag:active{background:#bddcff}
/* Flow panel */
.flow{
  margin-top:12px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:8px;
  padding:16px;
  display:none;
  font-size:13px;
  line-height:1.8;
}
.flow.show{display:block}
.flow-title{
  font-size:13px;
  font-weight:600;
  color:var(--gray);
  margin-bottom:10px;
}
.flow ol{padding-left:20px;margin:0}
.flow li{margin-bottom:4px}
.flow .side-effect{
  margin-top:10px;
  padding:10px 12px;
  background:#fff8f0;
  border-left:3px solid #ff9500;
  border-radius:0 6px 6px 0;
  font-size:13px;
  color:#8b5e00;
}
.flow .tool-call{
  font-family:"SF Mono","Fira Code",Menlo,Consolas,monospace;
  font-size:12px;
  color:#6e6e73;
  background:var(--gray-light);
  padding:2px 6px;
  border-radius:4px;
}
/* Empty state */
.empty{
  text-align:center;
  padding:60px 24px;
  color:var(--gray);
  font-size:15px;
  display:none;
}
.empty.show{display:block}
/* Responsive */
@media(max-width:480px){
  .header{padding:32px 16px 24px}
  .header h1{font-size:28px}
  .search-wrap{padding:0 16px 16px}
  .tabs{padding:0 16px}
  .container{padding:16px}
  .card-head{padding:14px 16px}
  .card-inner{padding:0 16px 16px}
  .tab{padding:8px 14px;font-size:14px}
  .chip{padding:7px 12px;font-size:14px}
}
</style>
</head>

const listEl = document.getElementById('list');
const emptyEl = document.getElementById('empty');
const searchEl = document.getElementById('search');
const tabsEl = document.getElementById('tabs');

let activeTab = 'all';
let searchQuery = '';

function render() {
  const q = searchQuery.toLowerCase().trim();
  const filtered = DATA.filter(item => {
    const catMatch = activeTab === 'all' || item.cat === activeTab;
    if (!q) return catMatch;
    const wordMatch = item.words.some(w =>
      w.word.toLowerCase().includes(q) ||
      w.desc.toLowerCase().includes(q)
    );
    const titleMatch = item.title.toLowerCase().includes(q);
    const descMatch = item.desc.toLowerCase().includes(q);
    const cliMatch = item.cli.some(c =>
      c.cmd.toLowerCase().includes(q) ||
      c.desc.toLowerCase().includes(q)
    );
    return catMatch && (wordMatch || titleMatch || descMatch || cliMatch);
  });

  if (filtered.length === 0) {
    listEl.innerHTML = '';
    emptyEl.classList.add('show');
    return;
  }
  emptyEl.classList.remove('show');

  listEl.innerHTML = filtered.map((item, i) => `
    <div class="card" data-idx="${i}">
      <div class="card-head" onclick="toggle(this)">
        <div>
          <div class="card-title">
            ${item.title}
            <span class="card-badge">${item.catName}</span>
          </div>
          <div class="card-desc">${item.desc}</div>
        </div>
        <div class="card-right">
          <span class="card-arrow">&#9654;</span>
        </div>
      </div>
      <div class="card-body">
        <div class="card-inner">
          <div class="section-label">唤醒词</div>
          <div class="chips">
            ${item.words.map(w => `
              <button class="chip" onclick="selectWord(this)" data-word='${JSON.stringify(w)}'>
                ${w.word}
              </button>
            `).join('')}
          </div>
          <div class="detail" id="detail-${i}"></div>

          <div class="section-label">CLI 命令</div>
          <div>
            ${item.cli.map((c, ci) => `
              <span class="cli-tag" onclick="showFlow(this)" data-cli='${JSON.stringify(c)}'>${c.cmd}</span>
            `).join('')}
          </div>
          <div class="flow" id="flow-${i}"></div>
        </div>
      </div>
    </div>
  `).join('');
}

function toggle(head) {
  const card = head.closest('.card');
  card.classList.toggle('open');
}

function selectWord(btn) {
  const chips = btn.closest('.chips');
  const wasSelected = btn.classList.contains('selected');
  chips.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));

  const card = btn.closest('.card');
  const detail = card.querySelector('.detail');

  if (wasSelected) {
    detail.classList.remove('show');
    detail.innerHTML = '';
    return;
  }

  btn.classList.add('selected');
  const w = JSON.parse(btn.dataset.word);
  let html = `<div class="detail-title">${w.word}</div>`;
  html += `<p>${w.desc}</p>`;
  if (w.example) {
    html += `<p><strong>示例：</strong><span class="cli-tag" style="cursor:default">${w.example}</span></p>`;
  }
  detail.innerHTML = html;
  detail.classList.add('show');
}

function showFlow(tag) {
  const card = tag.closest('.card');
  const flowEl = card.querySelector('.flow');
  const wasActive = flowEl.classList.contains('show') &&
    flowEl.dataset.cmd === tag.dataset.cli;

  card.querySelectorAll('.cli-tag').forEach(t => t.style.borderColor = 'transparent');

  if (wasActive) {
    flowEl.classList.remove('show');
    flowEl.innerHTML = '';
    return;
  }

  tag.style.borderColor = 'var(--blue)';
  const c = JSON.parse(tag.dataset.cli);
  flowEl.dataset.cmd = tag.dataset.cli;

  let html = `<div class="flow-title">执行流程：${c.desc}</div>`;
  html += '<ol>' + c.flow.map(s => `<li>${s}</li>`).join('') + '</ol>';
  if (c.side) {
    html += `<div class="side-effect"><strong>副作用：</strong>${c.side}</div>`;
  }
  flowEl.innerHTML = html;
  flowEl.classList.add('show');
}

// Tab click
tabsEl.addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  tabsEl.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  activeTab = tab.dataset.cat;
  render();
});

// Search
searchEl.addEventListener('input', e => {
  searchQuery = e.target.value;
  render();
});

// Initial render
render();
</script>
</body>
</html>
